<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎱 Marble Race</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #060610;
    color: #f0f0ff;
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 40px;
    padding: 20px;
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 10vw, 5rem);
    color: #ff6b2b;
    text-shadow: 0 0 60px #ff6b2b88;
    letter-spacing: 6px;
    text-align: center;
  }
  .cards {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 700px;
  }
  .card {
    flex: 1;
    min-width: 240px;
    background: #13131e;
    border: 1px solid #ffffff11;
    border-radius: 16px;
    padding: 32px 28px;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
    text-decoration: none;
    color: inherit;
  }
  .card:hover { transform: translateY(-4px); border-color: #ff6b2b; box-shadow: 0 8px 40px #ff6b2b33; }
  .card-icon { font-size: 3rem; display: block; margin-bottom: 12px; }
  .card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 3px;
    color: #ffcc00;
    margin-bottom: 8px;
  }
  .card-desc { color: #6666aa; font-size: .9rem; line-height: 1.5; }
  .badge {
    display: inline-block;
    background: #ff6b2b;
    color: #fff;
    font-size: .65rem;
    font-weight: 900;
    padding: 2px 10px;
    border-radius: 20px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 8px;
  }
</style>
</head>
<body>
  <h1>🎱 MARBLE RACE</h1>
  <div class="cards">
    <a class="card" href="/host.html">
      <span class="card-icon">🎮</span>
      <div class="card-title">HOST</div>
      <div class="card-desc">Entra aquí para configurar las canicas y controlar la partida</div>
      <div class="badge">Solo tú</div>
    </a>
    <a class="card" href="/game.html">
      <span class="card-icon">👀</span>
      <div class="card-title">ESPECTADOR</div>
      <div class="card-desc">Comparte este enlace con tus amigos para que vean la carrera</div>
      <div class="badge">Tus amigos</div>
    </a>
  </div>
</body>
</html>
