<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MARBLE RACE</title>
<script src="/socket.io/socket.io.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a0f; overflow: hidden; font-family: 'Nunito', sans-serif; }
canvas { display: block; }

/* ── HUD ── */
#hud {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 18px;
  background: linear-gradient(#000000cc, transparent);
  pointer-events: none;
  z-index: 20;
}
#roundLabel {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem; letter-spacing: 4px;
  color: #ffcc00;
  text-shadow: 0 0 12px #ffcc0088;
}
#leaderHud {
  display: flex; align-items: center; gap: 10px;
  background: #ffffff15; border-radius: 30px;
  padding: 6px 16px;
}
#leaderAvatar {
  width: 36px; height: 36px; border-radius: 50%;
  border: 2px solid gold; object-fit: cover;
}
#leaderName {
  font-weight: 900; font-size: .9rem; color: #ffcc00;
  max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* ── CONTROL DE VOLUMEN ── */
#volBox {
  position: fixed; bottom: 20px; right: 20px;
  background: #13131eee; border: 1px solid #ffffff22;
  border-radius: 14px; padding: 14px 18px;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  z-index: 30; pointer-events: all;
}
#volBox label {
  font-size: .7rem; font-weight: 700; color: #6666aa;
  text-transform: uppercase; letter-spacing: 1px;
}
#volSlider {
  -webkit-appearance: none;
  width: 120px; height: 6px;
  border-radius: 3px; background: #333;
  outline: none; cursor: pointer;
}
#volSlider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px; height: 18px; border-radius: 50%;
  background: #ff6b2b; cursor: pointer;
}
#volIcon { font-size: 1.4rem; }

/* ── WINNER ── */
#winner {
  display: none;
  position: fixed; inset: 0;
  flex-direction: column; align-items: center; justify-content: center;
  background: #000000cc;
  color: white;
  z-index: 40;
  text-align: center;
}
#winner h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 4rem; letter-spacing: 6px;
  color: #ffcc00; text-shadow: 0 0 40px #ffcc0099;
  margin-bottom: 10px;
}
#winnerName {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.6rem; letter-spacing: 3px; color: #fff;
}
#winnerImg {
  width: 150px; height: 150px; border-radius: 50%;
  object-fit: cover; border: 5px solid gold;
  margin-top: 16px; display: none;
}

/* ── LOBBY / WAITING ── */
#overlay {
  position: fixed; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: #0a0a0f;
  z-index: 50;
}
#overlay h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 4rem; letter-spacing: 6px;
  color: #ff6b2b; text-shadow: 0 0 30px #ff6b2b88;
  margin-bottom: 8px;
}
#overlay p { color: #6666aa; font-size: .95rem; }
#marblePreview {
  display: flex; flex-wrap: wrap; gap: 12px;
  justify-content: center; margin-top: 28px; max-width: 500px;
}
.previewBall {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  font-size: .75rem; color: #aaa; font-weight: 700;
}
.previewBall .ball {
  width: 54px; height: 54px; border-radius: 50%; object-fit: cover;
  border: 3px solid #ffffff33;
}
</style>
</head>
<body>

<!-- Overlay de espera -->
<div id="overlay">
  <h1>🎱 MARBLE RACE</h1>
  <p>Esperando al host…</p>
  <div id="marblePreview"></div>
</div>

<!-- Canvas del juego -->
<canvas id="c"></canvas>

<!-- HUD superior -->
<div id="hud">
  <div id="roundLabel">RONDA 1</div>
  <div id="leaderHud" style="display:none">
    <img id="leaderAvatar" src="" alt="">
    <div id="leaderName">—</div>
  </div>
</div>

<!-- Control de volumen -->
<div id="volBox">
  <div id="volIcon">🔊</div>
  <label>Volumen</label>
  <input type="range" id="volSlider" min="0" max="1" step="0.05" value="0.6">
</div>

<!-- Pantalla de ganador -->
<div id="winner">
  <h1>🏆 GANADOR 🏆</h1>
  <div id="winnerName"></div>
  <img id="winnerImg" src="" alt="">
</div>

<script>
const WORLD_W  = 800;
const TRACK_H  = 7000;
const FINISH_Y = TRACK_H - 200;
const R        = 22;

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

let W = window.innerWidth;
let H = window.innerHeight;

canvas.width  = W;
canvas.height = H;

window.addEventListener('resize', () => {

  W = window.innerWidth;
  H = window.innerHeight;

  canvas.width  = W;
  canvas.height = H;
});

function scaleX(x) {
  return x * (W / WORLD_W);
}

function scaleLen(l) {
  return l * (W / WORLD_W);
}

let marbles     = [];
let positions   = [];
let trackBodies = [];

let state = {
  phase: 'setup',
  round: 1,
  currentLeader: null
};

let leaderIdNow = null;
let raceEnded   = false;
let cameraY     = 0;

// AUDIO FIX
const audios       = {};
let currentAudio   = null;
let userVolume     = 0.6;
let fadeInterval   = null;

window.addEventListener('click', () => {

  Object.values(audios).forEach(a => {

    a.play()
      .then(() => {
        a.pause();
        a.currentTime = 0;
      })
      .catch(() => {});
  });

}, { once: true });

document.getElementById('volSlider')
.addEventListener('input', e => {

  userVolume = parseFloat(e.target.value);

  if (currentAudio) {
    currentAudio.volume = userVolume;
  }

  document.getElementById('volIcon').textContent =
    userVolume === 0
      ? '🔇'
      : userVolume < 0.4
        ? '🔉'
        : '🔊';
});

function switchLeaderAudio(leaderId) {

  if (leaderIdNow === leaderId) return;

  leaderIdNow = leaderId;

  if (fadeInterval) {
    clearInterval(fadeInterval);
    fadeInterval = null;
  }

  if (currentAudio) {

    const oldAudio = currentAudio;

    fadeInterval = setInterval(() => {

      oldAudio.volume -= 0.05;

      if (oldAudio.volume <= 0.05) {

        oldAudio.pause();
        oldAudio.currentTime = 0;
        oldAudio.volume = userVolume;

        clearInterval(fadeInterval);
      }

    }, 40);
  }

  currentAudio = null;

  if (!leaderId) return;

  const marble = marbles.find(m => m.id === leaderId);

  if (!marble || !marble.sound) return;

  if (!audios[leaderId]) {

    const audio = new Audio(marble.sound);

    audio.loop = true;
    audio.preload = 'auto';
    audio.volume = 0;

    audios[leaderId] = audio;
  }

  const audio = audios[leaderId];

  currentAudio = audio;

  audio.play().catch(() => {});

  fadeInterval = setInterval(() => {

    if (audio.volume < userVolume) {

      audio.volume = Math.min(
        userVolume,
        audio.volume + 0.05
      );

    } else {

      clearInterval(fadeInterval);
    }

  }, 40);
}

function stopAllAudio() {

  if (fadeInterval) {

    clearInterval(fadeInterval);
    fadeInterval = null;
  }

  Object.values(audios).forEach(audio => {

    audio.pause();
    audio.currentTime = 0;
    audio.volume = userVolume;
  });

  currentAudio = null;
  leaderIdNow  = null;
}

function drawTrack() {

  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);

  trackBodies.forEach(b => {

    const sx = scaleX(b.x);
    const sy = b.y - cameraY;

    if (sy < -300 || sy > H + 300) return;

    ctx.save();

    ctx.translate(sx, sy);
    ctx.rotate(b.angle);

    if (b.radius) {

      ctx.beginPath();
      ctx.arc(0, 0, scaleLen(b.radius), 0, Math.PI * 2);
      ctx.fillStyle = '#ff6b2b';
      ctx.fill();

    } else {

      ctx.fillStyle = '#6677dd';

      ctx.fillRect(
        -scaleLen(b.rw) / 2,
        -b.rh / 2,
        scaleLen(b.rw),
        b.rh
      );
    }

    ctx.restore();
  });
}

function drawMarbles() {

  const scaledR = scaleLen(R);

  positions.forEach(pos => {

    const marble = marbles.find(m => m.id === pos.id);

    if (!marble) return;

    const sx = scaleX(pos.x);
    const sy = pos.y - cameraY;

    ctx.beginPath();
    ctx.arc(sx, sy, scaledR, 0, Math.PI * 2);

    ctx.fillStyle = marble.color;
    ctx.fill();

    if (leaderIdNow === pos.id) {

      ctx.beginPath();
      ctx.arc(sx, sy, scaledR + 4, 0, Math.PI * 2);
      ctx.strokeStyle = 'gold';
      ctx.lineWidth = 3;
      ctx.stroke();
    }
  });
}

function updateCamera() {

  if (!positions.length) return;

  const leader = positions.reduce((a, b) =>
    a.y > b.y ? a : b
  );

  const targetY = leader.y - H * 0.35;

  cameraY += (targetY - cameraY) * 0.08;

  cameraY = Math.max(0, cameraY);
}

function loop() {

  if (
    state.phase === 'racing' ||
    state.phase === 'results'
  ) {

    ctx.clearRect(0, 0, W, H);

    updateCamera();
    drawTrack();
    drawMarbles();
  }

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

const socket = io();

socket.on('stateUpdate', s => {

  state   = s;
  marbles = s.marbles || [];

  document.getElementById('roundLabel')
    .textContent = 'RONDA ' + s.round;

  if (
    s.currentLeader &&
    s.phase === 'racing'
  ) {

    switchLeaderAudio(s.currentLeader);
  }
});

socket.on('trackData', data => {

  trackBodies = data;
  cameraY     = 0;
});

socket.on('positions', data => {
  positions = data;
});

socket.on('leaderChange', leaderId => {
  switchLeaderAudio(leaderId);
});

socket.on('raceWinner', () => {

  if (raceEnded) return;

  raceEnded = true;

  stopAllAudio();
});

socket.on('raceReset', () => {

  stopAllAudio();

  raceEnded   = false;
  positions   = [];
  trackBodies = [];
  cameraY     = 0;
});
</script>
  
</body>
</html>
