<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLADIATOR ARENA</title>
<script src="/socket.io/socket.io.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a0f; overflow: hidden; font-family: 'Nunito', sans-serif; }
canvas { display: block; }

#hud {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 18px;
  background: linear-gradient(#000000cc, transparent);
  pointer-events: none; z-index: 20;
}
#roundLabel {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem; letter-spacing: 4px;
  color: #ffcc00;
}

#winner {
  display: none;
  position: fixed; inset: 0;
  flex-direction: column; align-items: center; justify-content: center;
  background: #000000dd; color: white; z-index: 40; text-align: center;
}
#winner h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 4rem; letter-spacing: 6px;
  color: #ffcc00; text-shadow: 0 0 40px #ffcc0099; margin-bottom: 10px;
}
#winnerName {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.6rem; letter-spacing: 3px; color: #fff;
}
#winnerImg {
  width: 120px; height: 120px; border-radius: 50%;
  object-fit: cover; border: 5px solid gold; margin-top: 16px; display: none;
}

#overlay {
  position: fixed; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: #0a0a0f; z-index: 50;
}
#overlay h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3rem; letter-spacing: 6px;
  color: #ff4444; text-shadow: 0 0 30px #ff444488; margin-bottom: 8px;
}
#overlay p { color: #6666aa; font-size: .95rem; }

#volBox {
  position: fixed; bottom: 16px; right: 16px;
  background: #13131eee; border: 1px solid #ffffff22;
  border-radius: 12px; padding: 10px 14px;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  z-index: 30; pointer-events: all;
}
#volBox label { font-size: .65rem; font-weight: 700; color: #6666aa; text-transform: uppercase; letter-spacing: 1px; }
#volSlider { -webkit-appearance: none; width: 100px; height: 5px; border-radius: 3px; background: #333; outline: none; cursor: pointer; }
#volSlider::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #ff4444; cursor: pointer; }
#volIcon { font-size: 1.2rem; }

.marblePreview {
  display: flex; flex-wrap: wrap; gap: 10px;
  justify-content: center; margin-top: 20px; max-width: 450px;
}
.previewBall {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  font-size: .7rem; color: #aaa; font-weight: 700;
}
.previewBall .ball {
  width: 46px; height: 46px; border-radius: 50%; object-fit: cover;
  border: 3px solid #ffffff33;
}
</style>
</head>
<body>

<div id="overlay">
  <h1>&#x2694; GLADIATOR ARENA &#x2694;</h1>
  <p>Esperando al host&#x2026;</p>
  <div id="marblePreview" class="marblePreview"></div>
</div>

<canvas id="c"></canvas>

<div id="hud">
  <div id="roundLabel">RONDA 1</div>
  <div style="color:#888;font-size:.8rem">&#x2694; COLISEO &#x2694;</div>
  <div></div>
</div>

<div id="volBox">
  <div id="volIcon">&#x1f50a;</div>
  <label>Vol</label>
  <input type="range" id="volSlider" min="0" max="1" step="0.05" value="0.6">
</div>

<div id="winner">
  <h1>&#x1f3c6; CAMPE&#xd3;N &#x1f3c6;</h1>
  <div id="winnerName"></div>
  <img id="winnerImg" src="" alt="">
  <div style="color:#888;font-size:.85rem;margin-top:10px">&#x1f3b5; Tema del campe&#xf3;n &#x1f3b5;</div>
</div>

<script>
const W_W = 800, W_H = 500, G_Y = 440, R_BODY = 22;

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W = window.innerWidth;
let H = window.innerHeight;
canvas.width  = W;
canvas.height = H;
window.addEventListener('resize', () => {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = W;
  canvas.height = H;
});

function sx(x) { return x * (W / W_W); }
function sy(y) { return y * (H / W_H); }
function sl(l) { return l * (W / W_W); }

let marbles    = [];
let gladState  = [];
let gamePhase  = 'setup';
let roundNum   = 1;
let scores     = {};
let userVolume = 0.6;

document.getElementById('volSlider').addEventListener('input', e => {
  userVolume = parseFloat(e.target.value);
  document.getElementById('volIcon').textContent =
    userVolume === 0 ? '\u{1f507}' : userVolume < 0.4 ? '\u{1f509}' : '\u{1f50a}';
});

let currentAudio = null;

function stopAudio() {
  if (currentAudio) {
    try { currentAudio.pause(); currentAudio.currentTime = 0; currentAudio.src = ''; currentAudio.load(); } catch(e) {}
    currentAudio = null;
  }
}

// ─── PARTICLES ──────────────────────────────────────────────────────
let particles = [];
function spawnHitParticles(x, y, color) {
  for (let i = 0; i < 8; i++) {
    particles.push({
      x, y, color,
      vx: (Math.random() - 0.5) * 6,
      vy: -Math.random() * 6 - 1,
      life: 30 + Math.random() * 20
    });
  }
}
function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.2;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles() {
  particles.forEach(p => {
    const alpha = p.life / 40;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(sx(p.x), sy(p.y), sl(2 + alpha * 2), 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ─── DRAW ───────────────────────────────────────────────────────────
function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0d0a1a');
  grad.addColorStop(0.4, '#1a0d2a');
  grad.addColorStop(0.7, '#2a1a0a');
  grad.addColorStop(1, '#0a0502');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  for (let i = 0; i < 30; i++) {
    ctx.fillStyle = `rgba(255,200,100,${0.02 + Math.random() * 0.02})`;
    ctx.fillRect(Math.random() * W, Math.random() * H * 0.5, 2, 1);
  }
}

function drawGround() {
  const gy = sy(G_Y);
  const gH = H - gy + 5;

  ctx.fillStyle = '#2a1a0a';
  ctx.fillRect(0, gy, W, gH);
  ctx.fillStyle = '#3a2a15';
  ctx.fillRect(0, gy, W, 4);

  ctx.strokeStyle = '#5a3a1a44';
  ctx.lineWidth = 1;
  for (let tx = 0; tx < W; tx += 30) {
    ctx.beginPath(); ctx.moveTo(tx, gy + 6); ctx.lineTo(tx + 20, gy + gH - 5); ctx.stroke();
  }
  for (let tx = 15; tx < W; tx += 30) {
    ctx.beginPath(); ctx.moveTo(tx, gy + gH - 5); ctx.lineTo(tx + 25, gy + 6); ctx.stroke();
  }

  // Pillars
  ctx.fillStyle = '#1a0f05';
  ctx.fillRect(0, 0, 6, H);
  ctx.fillRect(W - 6, 0, 6, H);
}

function drawGladiator(g) {
  if (!g.alive) return;
  const x = sx(g.x), y = sy(g.y);
  const m = marbles.find(mm => mm.id === g.id);
  const col = m ? m.color : '#ff4444';
  const name = m ? m.name : '?';

  // Facing direction
  const nDist = 1;
  let fx = 1, fy = 0;
  let nearest = null, minD = Infinity;
  gladState.forEach(o => {
    if (o.id === g.id || !o.alive) return;
    const dx = o.x - g.x, dy = o.y - g.y;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d < minD) { minD = d; nearest = o; }
  });
  if (nearest) { fx = nearest.x - g.x; fy = nearest.y - g.y; }
  const fl = Math.sqrt(fx * fx + fy * fy) || 1;
  fx /= fl; fy /= fl;

  const facingRight = fx > 0;
  const sc = sl(1);

  ctx.save();
  ctx.translate(x, y);
  if (!facingRight) ctx.scale(-1, 1);
  ctx.scale(sc, sl(1));

  const walk = g.walkPhase || 0;
  const att  = g.attacking ? Math.min(1, (Date.now() - g.lastAttack + 250) / 250) : 0;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(0, sl(20), sl(14), sl(4), 0, 0, Math.PI * 2);
  ctx.fill();

  // -------
  // LEGS
  // -------
  ctx.lineCap = 'round';
  ctx.lineWidth = sl(4);

  const legSwing = Math.sin(walk) * 0.4;
  const bodyH = sl(20);
  const legLen = sl(14);

  // Left leg
  ctx.strokeStyle = darken(col, 40);
  ctx.beginPath();
  ctx.moveTo(sl(-4), bodyH);
  ctx.lineTo(sl(-4) - Math.sin(legSwing + 0.3) * legLen, bodyH + legLen * Math.cos(legSwing + 0.3));
  ctx.stroke();

  // Right leg
  ctx.strokeStyle = darken(col, 30);
  ctx.beginPath();
  ctx.moveTo(sl(4), bodyH);
  ctx.lineTo(sl(4) - Math.sin(-legSwing + 0.3) * legLen, bodyH + legLen * Math.cos(-legSwing + 0.3));
  ctx.stroke();

  // -------
  // BODY (rectangle collision hull visual)
  // -------
  const bh = sl(22);
  const bw = sl(13);
  const bodyGrad = ctx.createLinearGradient(-bw, -bh, bw, bh);
  bodyGrad.addColorStop(0, lighten(col, 40));
  bodyGrad.addColorStop(0.5, col);
  bodyGrad.addColorStop(1, darken(col, 30));
  ctx.fillStyle = bodyGrad;
  ctx.shadowColor = col + '44';
  ctx.shadowBlur = sl(8);
  ctx.fillRect(-bw, -bh, bw * 2, bh * 2);
  ctx.shadowBlur = 0;

  // Belt
  ctx.fillStyle = darken(col, 50);
  ctx.fillRect(-bw - 1, sl(2), bw * 2 + 2, sl(4));
  ctx.fillStyle = '#ffcc0055';
  ctx.fillRect(sl(-2), sl(2), sl(4), sl(4));

  // -------
  // ARMS
  // -------
  ctx.lineWidth = sl(3.5);
  const armLen = sl(13);
  const armSwing = Math.sin(walk + Math.PI) * 0.3;

  // Back arm
  ctx.strokeStyle = darken(col, 20);
  const baEndX = sl(-8) + Math.sin(-armSwing) * armLen;
  const baEndY = sl(-5) + Math.cos(-armSwing) * armLen;
  ctx.beginPath();
  ctx.moveTo(sl(-6), sl(-5));
  ctx.lineTo(baEndX, baEndY);
  ctx.stroke();

  // Front arm (with weapon)
  ctx.strokeStyle = lighten(col, 20);
  let faEndX, faEndY;
  if (g.attacking && att > 0) {
    const ext = 1 + (1 - att) * 0.8;
    faEndX = sl(6) + armLen * ext;
    faEndY = sl(-3) - (1 - att) * sl(8);
  } else {
    faEndX = sl(6) + Math.sin(armSwing) * armLen;
    faEndY = sl(-5) + Math.cos(armSwing) * armLen;
  }
  ctx.beginPath();
  ctx.moveTo(sl(6), sl(-5));
  ctx.lineTo(faEndX, faEndY);
  ctx.stroke();

  // Weapon
  ctx.font = `${sl(12)}px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText(g.weapon.icon, faEndX + sl(6), faEndY + sl(2));

  // -------
  // HEAD (marble / ball)
  // -------
  const headR = sl(11);
  const headY = -bh - headR + sl(2);
  const img = m && marbleImages[m.id];
  ctx.save();
  ctx.beginPath();
  ctx.arc(0, headY, headR, 0, Math.PI * 2);
  ctx.shadowColor = col + '88';
  ctx.shadowBlur = sl(12);

  if (img && img.complete && img.naturalWidth > 0) {
    ctx.clip();
    ctx.drawImage(img, -headR, headY - headR, headR * 2, headR * 2);
  } else {
    ctx.fillStyle = col;
    ctx.fill();
    ctx.strokeStyle = lighten(col, 40);
    ctx.lineWidth = sl(1.5);
    ctx.stroke();
  }
  ctx.restore();

  // Eye dot
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(sl(3), headY - sl(2), sl(2), 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(sl(4), headY - sl(2), sl(1), 0, Math.PI * 2);
  ctx.fill();

  // -------
  // HP BAR
  // -------
  const barW = sl(36);
  const barH = sl(5);
  const barY = headY - headR - sl(10);

  ctx.fillStyle = '#1a0000cc';
  ctx.fillRect(-barW / 2, barY, barW, barH);
  const pct = g.hp / g.maxHp;
  const hpCol = pct > 0.5 ? '#39ff14' : pct > 0.25 ? '#ffcc00' : '#ff2244';
  ctx.shadowColor = hpCol + '66';
  ctx.shadowBlur = sl(6);
  ctx.fillStyle = hpCol;
  ctx.fillRect(-barW / 2 + 1, barY + 1, (barW - 2) * pct, barH - 2);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#ffffff22';
  ctx.fillRect(-barW / 2, barY, barW, sl(2));

  // HP text
  ctx.font = `700 ${sl(8)}px Nunito`;
  ctx.fillStyle = '#fff';
  ctx.shadowColor = '#000';
  ctx.shadowBlur = sl(4);
  ctx.textAlign = 'center';
  ctx.fillText(Math.ceil(g.hp), 0, barY + barH + sl(10));
  ctx.shadowBlur = 0;

  // Name
  ctx.font = `700 ${sl(9)}px Nunito`;
  ctx.fillStyle = '#fff';
  ctx.shadowColor = '#000';
  ctx.shadowBlur = sl(3);
  ctx.fillText(name, 0, barY - sl(3));
  ctx.shadowBlur = 0;

  ctx.restore();
}

const marbleImages = {};
function preloadImages() {
  marbles.forEach(m => {
    if (m.image && !marbleImages[m.id]) {
      const img = new Image(); img.src = m.image;
      marbleImages[m.id] = img;
    }
  });
}

function lighten(hex, amt) {
  const n = parseInt(hex.replace('#', ''), 16);
  return `rgb(${Math.min(255,(n>>16)+amt)},${Math.min(255,((n>>8)&255)+amt)},${Math.min(255,(n&255)+amt)})`;
}
function darken(hex, amt) {
  const n = parseInt(hex.replace('#', ''), 16);
  return `rgb(${Math.max(0,(n>>16)-amt)},${Math.max(0,((n>>8)&255)-amt)},${Math.max(0,(n&255)-amt)})`;
}

// ─── LOOP ───────────────────────────────────────────────────────────
function loop() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawGround();
  gladState.forEach(g => drawGladiator(g));
  updateParticles();
  drawParticles();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ─── PREVIEW ────────────────────────────────────────────────────────
function renderPreview() {
  const el = document.getElementById('marblePreview');
  el.innerHTML = marbles.map(m => {
    const s = m.image
      ? `background:url('${m.image}') center/cover; border-color:${m.color};`
      : `background:${m.color};`;
    return `<div class="previewBall"><div class="ball" style="${s}"></div><span>${m.name}</span></div>`;
  }).join('');
}

// ─── SOCKET ─────────────────────────────────────────────────────────
const socket = io();

socket.on('stateUpdate', s => {
  gamePhase = s.phase;
  marbles   = s.marbles || [];
  roundNum  = s.round;
  scores    = s.scores || {};
  preloadImages();
  renderPreview();
  document.getElementById('roundLabel').textContent = 'RONDA ' + s.round;

  const overlay = document.getElementById('overlay');
  if (s.phase === 'racing') {
    overlay.style.display = 'none';
    document.getElementById('winner').style.display = 'none';
    gladState = [];
  } else {
    overlay.style.display = 'flex';
    const txt = { setup:'Configurando...', lobby:'Esperando...', ready:'Preparados...', results:'\u{1f3c6} Batalla finalizada!' };
    document.querySelector('#overlay p').textContent = txt[s.phase] || s.phase;
  }
});

socket.on('battleState', data => {
  gladState = data;
  data.forEach(g => {
    if (g.hp <= 0 || g.hp === g.maxHp) return;
    const prev = gladState.find(p => p.id === g.id);
    if (prev && prev.hp > g.hp && g.hp > 0) {
      spawnHitParticles(g.x, g.y, '#ffcc00');
    }
  });
});

socket.on('battleWinner', data => {
  stopAudio();
  const el = document.getElementById('winner');
  document.getElementById('winnerName').textContent = data.winnerName || 'Nadie';
  const m = marbles.find(mm => mm.id === data.winnerId);
  if (m && m.image) {
    document.getElementById('winnerImg').src = m.image;
    document.getElementById('winnerImg').style.display = 'block';
  } else {
    document.getElementById('winnerImg').style.display = 'none';
  }
  el.style.display = 'flex';

  if (data.winnerSound) {
    const a = new Audio(data.winnerSound);
    a.loop = true; a.volume = userVolume;
    a.play().catch(() => {});
    currentAudio = a;
  }
});

socket.on('battleReset', () => {
  stopAudio();
  gladState = [];
  particles = [];
  document.getElementById('winner').style.display = 'none';
  document.getElementById('overlay').style.display = 'flex';
  document.querySelector('#overlay p').textContent = '\u00a1Preparados!';
});
</script>
</body>
</html>
