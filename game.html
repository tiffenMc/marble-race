<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLADIATOR ARENA</title>
<script src="/socket.io/socket.io.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a0f; overflow: hidden; font-family: 'Nunito', sans-serif; }
canvas { display: block; }

#hud {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 18px;
  background: linear-gradient(#000000cc, transparent);
  pointer-events: none;
  z-index: 20;
}
#roundLabel {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem; letter-spacing: 4px;
  color: #ffcc00;
}
#hudCenter { color: #888; font-size: .85rem; text-align: center; }

#winner {
  display: none;
  position: fixed; inset: 0;
  flex-direction: column; align-items: center; justify-content: center;
  background: #000000dd;
  color: white; z-index: 40; text-align: center;
}
#winner h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 4rem; letter-spacing: 6px;
  color: #ffcc00; text-shadow: 0 0 40px #ffcc0099;
  margin-bottom: 10px;
}
#winnerName {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.6rem; letter-spacing: 3px; color: #fff;
}
#winnerImg {
  width: 120px; height: 120px; border-radius: 50%;
  object-fit: cover; border: 5px solid gold;
  margin-top: 16px; display: none;
}

#overlay {
  position: fixed; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: #0a0a0f; z-index: 50;
}
#overlay h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3.5rem; letter-spacing: 6px;
  color: #ff4444; text-shadow: 0 0 30px #ff444488;
  margin-bottom: 8px;
}
#overlay p { color: #6666aa; font-size: .95rem; }

#volBox {
  position: fixed; bottom: 20px; right: 20px;
  background: #13131eee; border: 1px solid #ffffff22;
  border-radius: 14px; padding: 14px 18px;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  z-index: 30; pointer-events: all;
}
#volBox label { font-size: .7rem; font-weight: 700; color: #6666aa; text-transform: uppercase; letter-spacing: 1px; }
#volSlider {
  -webkit-appearance: none;
  width: 120px; height: 6px; border-radius: 3px; background: #333;
  outline: none; cursor: pointer;
}
#volSlider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px; height: 18px; border-radius: 50%; background: #ff4444; cursor: pointer;
}
#volIcon { font-size: 1.4rem; }

.marblePreview {
  display: flex; flex-wrap: wrap; gap: 12px;
  justify-content: center; margin-top: 28px; max-width: 500px;
}
.previewBall {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  font-size: .75rem; color: #aaa; font-weight: 700;
}
.previewBall .ball {
  width: 54px; height: 54px; border-radius: 50%; object-fit: cover;
  border: 3px solid #ffffff33;
}

#killFeed {
  position: fixed; left: 16px; top: 70px;
  z-index: 15; display: flex; flex-direction: column; gap: 4px;
  pointer-events: none;
}
.killMsg {
  background: #00000099; color: #ff6666;
  padding: 4px 12px; border-radius: 8px;
  font-size: .75rem; font-weight: 700;
  animation: fadeKill 2s forwards;
}
@keyframes fadeKill { 0%{opacity:1;transform:translateX(0)} 100%{opacity:0;transform:translateX(-30px)} }
</style>
</head>
<body>

<div id="overlay">
  <h1>&#x2694; GLADIATOR ARENA &#x2694;</h1>
  <p>Esperando al host&#x2026;</p>
  <div id="marblePreview" class="marblePreview"></div>
</div>

<canvas id="c"></canvas>

<div id="hud">
  <div id="roundLabel">RONDA 1</div>
  <div id="hudCenter">&#x2694; &#x1f3ad; BATALLA &#x1f3ad; &#x2694;</div>
  <div></div>
</div>

<div id="volBox">
  <div id="volIcon">&#x1f50a;</div>
  <label>Volumen</label>
  <input type="range" id="volSlider" min="0" max="1" step="0.05" value="0.6">
</div>

<div id="winner">
  <h1>&#x1f3c6; CAMPE&#xd3;N &#x1f3c6;</h1>
  <div id="winnerName"></div>
  <img id="winnerImg" src="" alt="">
  <div style="color:#888;font-size:.9rem;margin-top:10px">&#x1f3b5; Tema del campe&#xf3;n &#x1f3b5;</div>
</div>

<div id="killFeed"></div>

<script>
const W_W = 800;
const A_H = 600;
const R   = 25;

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W = window.innerWidth;
let H = window.innerHeight;
canvas.width  = W;
canvas.height = H;
window.addEventListener('resize', () => {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = W;
  canvas.height = H;
});

function sx(x) { return x * (W / W_W); }
function sy(y) { return y * (H / A_H); }
function sl(l) { return l * (W / W_W); }

let marbles    = [];
let gladState  = [];
let gamePhase  = 'setup';
let roundNum   = 1;
let scores     = {};
let userVolume = 0.6;

document.getElementById('volSlider').addEventListener('input', e => {
  userVolume = parseFloat(e.target.value);
  document.getElementById('volIcon').textContent =
    userVolume === 0 ? '\u{1f507}' : userVolume < 0.4 ? '\u{1f509}' : '\u{1f50a}';
});

// ─── AUDIO ──────────────────────────────────────────────────────────
let currentAudio  = null;
let currentAudioId = null;
let audioFader    = null;

function stopAudio() {
  if (audioFader) { clearInterval(audioFader); audioFader = null; }
  if (currentAudio) {
    try { currentAudio.pause(); currentAudio.currentTime = 0; currentAudio.src = ''; currentAudio.load(); } catch(e) {}
    currentAudio = null;
  }
  currentAudioId = null;
}

function playSound(soundData, vol) {
  if (!soundData) return;
  const a = new Audio(soundData);
  a.volume = vol || userVolume;
  a.play().catch(() => {});
  return a;
}

// ─── DIBUJO ─────────────────────────────────────────────────────────
function drawArena() {
  const grad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.6);
  grad.addColorStop(0, '#2a1a0a');
  grad.addColorStop(0.5, '#1a0f05');
  grad.addColorStop(1, '#0a0502');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2;
  ctx.strokeStyle = '#ffcc0011';
  ctx.lineWidth = 1;
  for (let r = 50; r < Math.max(W, H); r += 60) {
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
  }

  ctx.strokeStyle = '#ffffff08';
  ctx.lineWidth = 2;
  ctx.strokeRect(0, 0, W, H);
}

function drawGladiator(g) {
  if (!g.alive) return;
  const x = sx(g.x);
  const y = sy(g.y);
  const r = sl(R);

  const m = marbles.find(m => m.id === g.id);
  const color = m ? m.color : '#ff4444';
  const name  = m ? m.name : '?';

  // Facing direction: find nearest enemy
  let fx = 0, fy = 0;
  let nearest = null, minD = Infinity;
  gladState.forEach(o => {
    if (o.id === g.id || !o.alive) return;
    const d = Math.sqrt((o.x - g.x) ** 2 + (o.y - g.y) ** 2);
    if (d < minD) { minD = d; nearest = o; }
  });
  if (nearest) { fx = nearest.x - g.x; fy = nearest.y - g.y; }
  const fLen = Math.sqrt(fx * fx + fy * fy) || 1;
  const fnx = fx / fLen, fny = fy / fLen;

  ctx.save();
  ctx.translate(x, y);

  const bodyLen = r * 0.9;
  const armLen  = r * 0.8;
  const legLen  = r * 0.7;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(2, 2, r, r * 0.6, 0, 0, Math.PI * 2); ctx.fill();

  // Body (torso)
  ctx.strokeStyle = color;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(fnx * 5, fny * 5);
  ctx.lineTo(fnx * bodyLen, fny * bodyLen);
  ctx.stroke();

  // Arms (left/right of body)
  const perpX = -fny, perpY = fnx;
  ctx.lineWidth = 2.5;
  const armSwing = g.attacking ? 0.6 : 0.3;
  [-1, 1].forEach(s => {
    const endX = fnx * 6 + perpX * s * armLen;
    const endY = fny * 6 + perpY * s * armLen;
    ctx.beginPath();
    ctx.moveTo(fnx * 4, fny * 4);
    ctx.lineTo(endX + fnx * armSwing * s * 10, endY + fny * armSwing * s * 10);
    ctx.stroke();
  });

  // Legs
  ctx.lineWidth = 2.5;
  [-1, 1].forEach(s => {
    const lx = fnx * bodyLen + perpX * s * legLen * 0.6;
    const ly = fny * bodyLen + perpY * s * legLen * 0.6;
    ctx.beginPath();
    ctx.moveTo(fnx * bodyLen, fny * bodyLen);
    ctx.lineTo(lx, ly);
    ctx.stroke();
  });

  // Head (the physics body)
  ctx.shadowColor = color + '66';
  ctx.shadowBlur  = 12;
  const img = m && marbleImages[m.id];
  if (img && img.complete && img.naturalWidth > 0) {
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.clip();
    ctx.drawImage(img, -r, -r, r * 2, r * 2);
    ctx.shadowBlur = 0;
  } else {
    const grad = ctx.createRadialGradient(-r * 0.3, -r * 0.3, 1, 0, 0, r);
    grad.addColorStop(0, lighten(color, 60));
    grad.addColorStop(1, color);
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = lighten(color, 30);
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Weapon icon
  ctx.shadowBlur = 0;
  ctx.font = `${sl(14)}px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText(g.weapon.icon, fnx * (bodyLen + r * 0.5), fny * (bodyLen + r * 0.5) - sl(8));

  // HP bar
  const barW = r * 2.2;
  const barH = 5;
  const barY = -r - sl(12);
  ctx.fillStyle = '#333';
  ctx.fillRect(-barW / 2, barY, barW, barH);
  const hpPct = g.hp / g.maxHp;
  ctx.fillStyle = hpPct > 0.5 ? '#39ff14' : hpPct > 0.25 ? '#ffcc00' : '#ff2244';
  ctx.fillRect(-barW / 2, barY, barW * hpPct, barH);
  ctx.strokeStyle = '#ffffff22';
  ctx.lineWidth = 1;
  ctx.strokeRect(-barW / 2, barY, barW, barH);

  // Name
  ctx.font = `700 ${sl(10)}px Nunito`;
  ctx.fillStyle = '#fff';
  ctx.shadowColor = '#000';
  ctx.shadowBlur = 4;
  ctx.fillText(name, 0, barY - sl(4));
  ctx.shadowBlur = 0;

  ctx.restore();
}

const marbleImages = {};
function preloadImages() {
  marbles.forEach(m => {
    if (m.image && !marbleImages[m.id]) {
      const img = new Image(); img.src = m.image;
      marbleImages[m.id] = img;
    }
  });
}

function lighten(hex, amt) {
  const n = parseInt(hex.replace('#', ''), 16);
  return `rgb(${Math.min(255,(n>>16)+amt)},${Math.min(255,((n>>8)&255)+amt)},${Math.min(255,(n&255)+amt)})`;
}

// ─── LOOP ───────────────────────────────────────────────────────────
function loop() {
  ctx.clearRect(0, 0, W, H);
  drawArena();
  gladState.forEach(g => drawGladiator(g));
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ─── PREVIEW ────────────────────────────────────────────────────────
function renderMarblePreview() {
  const el = document.getElementById('marblePreview');
  el.innerHTML = marbles.map(m => {
    const s = m.image
      ? `background:url('${m.image}') center/cover; border-color:${m.color};`
      : `background:${m.color};`;
    return `<div class="previewBall"><div class="ball" style="${s}"></div><span>${m.name}</span></div>`;
  }).join('');
}

// ─── SOCKET ─────────────────────────────────────────────────────────
const socket = io();

socket.on('stateUpdate', s => {
  gamePhase = s.phase;
  marbles   = s.marbles || [];
  roundNum  = s.round;
  scores    = s.scores || {};
  preloadImages();
  renderMarblePreview();
  document.getElementById('roundLabel').textContent = 'RONDA ' + s.round;

  const overlay = document.getElementById('overlay');
  if (s.phase === 'racing') {
    overlay.style.display = 'none';
    document.getElementById('winner').style.display = 'none';
    gladState = [];
  } else {
    overlay.style.display = 'flex';
    const txt = { setup:'Configurando...', lobby:'Esperando...', ready:'Preparados...', results:'Batalla finalizada' };
    document.querySelector('#overlay p').textContent = txt[s.phase] || s.phase;
  }

  if (s.phase === 'results') {
    document.querySelector('#overlay p').textContent = '\u{1f3c6} \u00a1Batalla finalizada!';
  }
});

socket.on('battleState', data => {
  gladState = data;
});

socket.on('battleWinner', data => {
  stopAudio();
  const el = document.getElementById('winner');
  document.getElementById('winnerName').textContent = data.winnerName || 'Nadie';
  const m = marbles.find(mm => mm.id === data.winnerId);
  if (m && m.image) {
    document.getElementById('winnerImg').src = m.image;
    document.getElementById('winnerImg').style.display = 'block';
  } else {
    document.getElementById('winnerImg').style.display = 'none';
  }
  el.style.display = 'flex';

  if (data.winnerSound) {
    const a = new Audio(data.winnerSound);
    a.loop = true;
    a.volume = userVolume;
    a.play().catch(() => {});
    currentAudio = a;
  }
});

socket.on('battleReset', () => {
  stopAudio();
  gladState = [];
  document.getElementById('winner').style.display = 'none';
  document.getElementById('overlay').style.display = 'flex';
  document.querySelector('#overlay p').textContent = '\u00a1Preparados!';
});
</script>
</body>
</html>
