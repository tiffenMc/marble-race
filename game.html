<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STICK ARENA</title>
<script src="/socket.io/socket.io.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a0f; overflow: hidden; font-family: 'Nunito', sans-serif; }
canvas { display: block; }
#hud { position:fixed; top:0; left:0; right:0; display:flex; align-items:center; justify-content:space-between; padding:8px 14px; background:linear-gradient(#000000cc,transparent); pointer-events:none; z-index:20; }
#roundLabel { font-family:'Bebas Neue',sans-serif; font-size:1.2rem; letter-spacing:3px; color:#ffcc00; }
#winner { display:none; position:fixed; inset:0; flex-direction:column; align-items:center; justify-content:center; background:#000000dd; color:white; z-index:40; text-align:center; }
#winner h1 { font-family:'Bebas Neue',sans-serif; font-size:3.5rem; letter-spacing:6px; color:#ffcc00; text-shadow:0 0 40px #ffcc0099; margin-bottom:10px; }
#winnerName { font-family:'Bebas Neue',sans-serif; font-size:2.2rem; letter-spacing:3px; color:#fff; }
#winnerImg { width:100px; height:100px; border-radius:50%; object-fit:cover; border:5px solid gold; margin-top:14px; display:none; }
#overlay { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#0a0a0f; z-index:50; }
#overlay h1 { font-family:'Bebas Neue',sans-serif; font-size:2.8rem; letter-spacing:6px; color:#ff4444; text-shadow:0 0 30px #ff444488; margin-bottom:8px; }
#overlay p { color:#6666aa; font-size:.9rem; }
#volBox { position:fixed; bottom:12px; right:12px; background:#13131eee; border:1px solid #ffffff22; border-radius:10px; padding:8px 12px; display:flex; flex-direction:column; align-items:center; gap:4px; z-index:30; pointer-events:all; }
#volBox label { font-size:.6rem; font-weight:700; color:#6666aa; text-transform:uppercase; letter-spacing:1px; }
#volSlider { -webkit-appearance:none; width:80px; height:4px; border-radius:2px; background:#333; outline:none; cursor:pointer; }
#volSlider::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:#ff4444; cursor:pointer; }
#volIcon { font-size:1rem; }
.marblePreview { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:16px; max-width:400px; }
.previewBall { display:flex; flex-direction:column; align-items:center; gap:3px; font-size:.65rem; color:#aaa; font-weight:700; }
.previewBall .ball { width:40px; height:40px; border-radius:50%; object-fit:cover; border:3px solid #ffffff33; }
</style>
</head>
<body>
<div id="overlay">
  <h1>&#x2694; STICK ARENA &#x2694;</h1>
  <p>Esperando al host&#x2026;</p>
  <div id="marblePreview" class="marblePreview"></div>
</div>
<canvas id="c"></canvas>
<div id="hud">
  <div id="roundLabel">RONDA 1</div>
  <div style="color:#888;font-size:.75rem">&#x1f3ad; COLISEO &#x1f3ad;</div>
  <div></div>
</div>
<div id="volBox">
  <div id="volIcon">&#x1f50a;</div>
  <label>Vol</label>
  <input type="range" id="volSlider" min="0" max="1" step="0.05" value="0.6">
</div>
<div id="winner">
  <h1>&#x1f3c6; CAMPE&#xd3;N &#x1f3c6;</h1>
  <div id="winnerName"></div>
  <img id="winnerImg" src="" alt="">
  <div style="color:#888;font-size:.8rem;margin-top:8px">&#x1f3b5; Tema del campe&#xf3;n &#x1f3b5;</div>
</div>

<script>
const W_W = 800, W_H = 500;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = window.innerWidth, H = window.innerHeight;
canvas.width = W; canvas.height = H;
window.addEventListener('resize', () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; });

function sx(x) { return x * (W / W_W); }
function sy(y) { return y * (H / W_H); }
function sl(l) { return l * Math.min(W / W_W, H / W_H); }

let marbles = [], gladState = [], projState = [], gamePhase = 'setup', roundNum = 1, userVolume = 0.6;

document.getElementById('volSlider').addEventListener('input', e => {
  userVolume = parseFloat(e.target.value);
  document.getElementById('volIcon').textContent = userVolume === 0 ? '\u{1f507}' : userVolume < 0.4 ? '\u{1f509}' : '\u{1f50a}';
});

let currentAudio = null;
function stopAudio() {
  if (currentAudio) { try { currentAudio.pause(); currentAudio.currentTime = 0; currentAudio.src = ''; currentAudio.load(); } catch(e) {} currentAudio = null; }
}

// ─── PARTICLES ──────────────────────────────────────────────────────
let parts = [];
function spawnParts(x, y, col, n) {
  for (let i = 0; i < (n || 6); i++) parts.push({ x, y, col, vx: (Math.random() - 0.5) * 5, vy: -Math.random() * 5 - 1, life: 20 + Math.random() * 15 });
}
function updParts() {
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life--;
    if (p.life <= 0) parts.splice(i, 1);
  }
}
function drwParts() {
  parts.forEach(p => { ctx.globalAlpha = p.life / 25; ctx.fillStyle = p.col; ctx.beginPath(); ctx.arc(sx(p.x), sy(p.y), sl(1.5 + (1 - p.life / 25) * 2), 0, Math.PI * 2); ctx.fill(); });
  ctx.globalAlpha = 1;
}

// ─── PLATFORM DATA ──────────────────────────────────────────────────
const PLATS = [
  { x: W_W / 2, y: 460, w: W_W, h: 30 },
  { x: 150, y: 360, w: 160, h: 12 }, { x: 500, y: 360, w: 180, h: 12 },
  { x: 350, y: 280, w: 200, h: 12 }, { x: 120, y: 280, w: 110, h: 12 }, { x: 620, y: 280, w: 110, h: 12 },
  { x: 400, y: 200, w: 160, h: 12 }, { x: 220, y: 200, w: 100, h: 12 }, { x: 580, y: 200, w: 100, h: 12 },
  { x: 400, y: 130, w: 120, h: 12 },
];

let prevHp = {};

// ─── DRAW ───────────────────────────────────────────────────────────
function drawBG() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#0a0a1a'); g.addColorStop(0.3, '#1a0d1a'); g.addColorStop(0.6, '#2a1508'); g.addColorStop(1, '#0a0500');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  for (let i = 0; i < 20; i++) { ctx.fillStyle = `rgba(255,200,100,${0.01 + Math.random() * 0.015})`; ctx.fillRect(Math.random() * W, Math.random() * H * 0.4, 1.5, 1); }
}

function drawPlats() {
  PLATS.forEach(p => {
    const x = sx(p.x), y = sy(p.y), w = sx(p.w), h = sy(p.h);
    const g = ctx.createLinearGradient(x - w / 2, y - h / 2, x + w / 2, y + h / 2);
    g.addColorStop(0, '#3a2a1a'); g.addColorStop(0.5, '#2a1a0a'); g.addColorStop(1, '#1a0f05');
    ctx.fillStyle = g;
    ctx.shadowColor = '#ffcc0022'; ctx.shadowBlur = sl(6);
    ctx.fillRect(x - w / 2, y - h / 2, w, h);
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#5a3a1a44'; ctx.lineWidth = sl(1);
    ctx.strokeRect(x - w / 2, y - h / 2, w, h);
    ctx.fillStyle = '#ffcc0011'; ctx.fillRect(x - w / 2, y - h / 2, w, sl(2));
  });
}

function drawStick(g) {
  if (!g.alive) return;
  const x = sx(g.x), y = sy(g.y);
  const m = marbles.find(mm => mm.id === g.id);
  const col = m ? m.color : '#ff4444';
  const name = m ? m.name : '?';

  let fx = 1;
  let nearest = null, minD = Infinity;
  gladState.forEach(o => { if (o.id === g.id || !o.alive) return; const dx = o.x - g.x; const d = dx * dx + (o.y - g.y) ** 2; if (d < minD) { minD = d; nearest = o; } });
  if (nearest) fx = nearest.x - g.x;
  const right = fx > 0;

  ctx.save();
  ctx.translate(x, y);
  if (!right) ctx.scale(-1, 1);
  const sc = Math.min(W / W_W, H / W_H);

  const walk = g.walkPhase || 0;
  const att = g.attacking ? 1 : 0;
  const S = sl(1);

  // ── LEGS ──
  ctx.lineCap = 'round';
  const k = 1.6;
  const lw = sl(2.5 * k);
  const legSw = Math.sin(walk) * 0.5;
  const legY = sl(10 * k), legLen = sl(10 * k);

  ctx.strokeStyle = '#444';
  ctx.lineWidth = lw;
  [-1, 1].forEach(s => {
    ctx.beginPath();
    ctx.moveTo(s * sl(3 * k), legY);
    ctx.lineTo(s * sl(3 * k) + Math.sin(legSw * s + 0.2) * legLen, legY + legLen * Math.cos(legSw * s + 0.2));
    ctx.stroke();
  });

  ctx.strokeStyle = col;
  ctx.lineWidth = lw;
  ctx.beginPath();
  ctx.moveTo(0, sl(2 * k));
  ctx.lineTo(0, legY);
  ctx.stroke();

  const armSw = Math.sin(walk + Math.PI) * 0.3;
  ctx.lineWidth = lw * 0.8;
  const armLen = sl(9 * k);

  ctx.strokeStyle = darken(col, 40);
  ctx.beginPath();
  ctx.moveTo(sl(-2 * k), sl(4 * k));
  ctx.lineTo(sl(-2 * k) + Math.sin(-armSw) * armLen, sl(4 * k) + Math.cos(-armSw) * armLen);
  ctx.stroke();

  ctx.strokeStyle = col;
  let faX, faY;
  if (g.attacking) {
    faX = sl(2 * k) + armLen + sl(5 * k); faY = sl(2 * k) - sl(3 * k);
  } else {
    faX = sl(2 * k) + Math.sin(armSw) * armLen; faY = sl(4 * k) + Math.cos(armSw) * armLen;
  }
  ctx.beginPath();
  ctx.moveTo(sl(2 * k), sl(4 * k));
  ctx.lineTo(faX, faY);
  ctx.stroke();

  ctx.font = `${sl(9 * k) | 0}px Arial`;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  if (g.weapon) ctx.fillText(g.weapon.icon, faX + sl(4 * k), faY + sl(1 * k));

  const hr = sl(6 * k);
  const hy = -hr - sl(1 * k);
  const img = m && marbleImages[m.id];
  ctx.save();
  ctx.beginPath();
  ctx.arc(0, hy, hr, 0, Math.PI * 2);
  ctx.shadowColor = col + '66';
  ctx.shadowBlur = sl(8);
  if (img && img.complete && img.naturalWidth > 0) {
    ctx.clip();
    ctx.drawImage(img, -hr, hy - hr, hr * 2, hr * 2);
  } else {
    ctx.fillStyle = col;
    ctx.fill();
    ctx.strokeStyle = lighten(col, 50); ctx.lineWidth = sl(1); ctx.stroke();
  }
  ctx.restore();

  // Eye dot
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(sl(3 * k), hy - sl(1 * k), sl(2 * k), 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(sl(4 * k), hy - sl(1 * k), sl(1 * k), 0, Math.PI * 2); ctx.fill();

  // ── HP BAR ──
  const bw = sl(30 * k), bh = sl(4 * k), by = hy - hr - sl(8 * k);
  ctx.fillStyle = '#1a0000cc';
  ctx.fillRect(-bw / 2, by, bw, bh);
  const pct = g.hp / g.maxHp;
  const hc = pct > 0.5 ? '#39ff14' : pct > 0.25 ? '#ffcc00' : '#ff2244';
  ctx.shadowColor = hc + '88'; ctx.shadowBlur = sl(6);
  ctx.fillStyle = hc;
  ctx.fillRect(-bw / 2 + 1, by + 1, (bw - 2) * pct, bh - 2);
  ctx.shadowBlur = 0;

  ctx.font = `700 ${sl(7) | 0}px Nunito`;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.shadowColor = '#000'; ctx.shadowBlur = sl(3);
  ctx.fillText(Math.ceil(g.hp), 0, by + bh + sl(8));
  ctx.fillStyle = '#ddd';
  ctx.fillText(name, 0, by - sl(2));
  ctx.shadowBlur = 0;

  ctx.restore(); // restore outer save (from line 144)
}

function drawProjectiles() {
  projState.forEach(p => {
    ctx.fillStyle = '#ffcc00';
    ctx.shadowColor = '#ffcc00'; ctx.shadowBlur = sl(10);
    ctx.beginPath(); ctx.arc(sx(p.x), sy(p.y), sl(3), 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
  });
}

const marbleImages = {};
function preloadImages() {
  marbles.forEach(m => { if (m.image && !marbleImages[m.id]) { const img = new Image(); img.src = m.image; marbleImages[m.id] = img; } });
}
function lighten(hex, a) { const n = parseInt(hex.replace('#', ''), 16); return `rgb(${Math.min(255,(n>>16)+a)},${Math.min(255,((n>>8)&255)+a)},${Math.min(255,(n&255)+a)})`; }
function darken(hex, a) { const n = parseInt(hex.replace('#', ''), 16); return `rgb(${Math.max(0,(n>>16)-a)},${Math.max(0,((n>>8)&255)-a)},${Math.max(0,(n&255)-a)})`; }

// ─── LOOP ───────────────────────────────────────────────────────────
function loop() {
  ctx.clearRect(0, 0, W, H);
  drawBG(); drawPlats();
  gladState.forEach(g => drawStick(g));
  drawProjectiles();
  updParts(); drwParts();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function renderPreview() {
  const el = document.getElementById('marblePreview');
  el.innerHTML = marbles.map(m => {
    const s = m.image ? `background:url('${m.image}') center/cover; border-color:${m.color};` : `background:${m.color};`;
    return `<div class="previewBall"><div class="ball" style="${s}"></div><span>${m.name}</span></div>`;
  }).join('');
}

const socket = io();

socket.on('stateUpdate', s => {
  gamePhase = s.phase; marbles = s.marbles || []; roundNum = s.round;
  preloadImages(); renderPreview();
  document.getElementById('roundLabel').textContent = 'RONDA ' + s.round;
  const overlay = document.getElementById('overlay');
  if (s.phase === 'racing') {
    overlay.style.display = 'none'; document.getElementById('winner').style.display = 'none'; gladState = []; prevHp = {};
  } else {
    overlay.style.display = 'flex';
    const txt = { setup:'Configurando...', lobby:'Esperando...', ready:'Preparados...', results:'\u{1f3c6} Batalla finalizada!' };
    document.querySelector('#overlay p').textContent = txt[s.phase] || s.phase;
  }
});

socket.on('battleState', data => {
  gladState = data.gladiators || [];
  projState = data.projectiles || [];
  gladState.forEach(g => {
    const prev = prevHp[g.id];
    if (prev !== undefined && prev > g.hp && g.hp > 0) { spawnParts(g.x, g.y, '#ffcc00', 5); spawnParts(g.x, g.y, g.weapon.icon, 3); }
    prevHp[g.id] = g.hp;
  });
});

socket.on('battleWinner', data => {
  stopAudio();
  document.getElementById('winner').style.display = 'flex';
  document.getElementById('winnerName').textContent = data.winnerName || 'Nadie';
  const m = marbles.find(mm => mm.id === data.winnerId);
  if (m && m.image) { document.getElementById('winnerImg').src = m.image; document.getElementById('winnerImg').style.display = 'block'; }
  else { document.getElementById('winnerImg').style.display = 'none'; }
  if (data.winnerSound) { const a = new Audio(data.winnerSound); a.loop = true; a.volume = userVolume; a.play().catch(() => {}); currentAudio = a; }
});

socket.on('battleReset', () => {
  stopAudio(); gladState = []; projState = []; parts = []; prevHp = {};
  document.getElementById('winner').style.display = 'none';
  document.getElementById('overlay').style.display = 'flex';
  document.querySelector('#overlay p').textContent = '\u00a1Preparados!';
});
</script>
</body>
</html>
