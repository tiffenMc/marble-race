<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MARBLE RACE</title>
<script src="/socket.io/socket.io.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a0f; overflow: hidden; font-family: 'Nunito', sans-serif; }
canvas { display: block; }

#hud {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 18px;
  background: linear-gradient(#000000cc, transparent);
  pointer-events: none;
  z-index: 20;
}
#roundLabel {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem; letter-spacing: 4px;
  color: #ffcc00;
  text-shadow: 0 0 12px #ffcc0088;
}
#leaderHud {
  display: flex; align-items: center; gap: 10px;
  background: #ffffff15; border-radius: 30px;
  padding: 6px 16px;
}
#leaderAvatar {
  width: 36px; height: 36px; border-radius: 50%;
  border: 2px solid gold; object-fit: cover;
}
#leaderName {
  font-weight: 900; font-size: .9rem; color: #ffcc00;
  max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

#volBox {
  position: fixed; bottom: 20px; right: 20px;
  background: #13131eee; border: 1px solid #ffffff22;
  border-radius: 14px; padding: 14px 18px;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  z-index: 30; pointer-events: all;
}
#volBox label {
  font-size: .7rem; font-weight: 700; color: #6666aa;
  text-transform: uppercase; letter-spacing: 1px;
}
#volSlider {
  -webkit-appearance: none;
  width: 120px; height: 6px;
  border-radius: 3px; background: #333;
  outline: none; cursor: pointer;
}
#volSlider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px; height: 18px; border-radius: 50%;
  background: #ff6b2b; cursor: pointer;
}
#volIcon { font-size: 1.4rem; }

#winner {
  display: none;
  position: fixed; inset: 0;
  flex-direction: column; align-items: center; justify-content: center;
  background: #000000cc;
  color: white;
  z-index: 40;
  text-align: center;
}
#winner h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 4rem; letter-spacing: 6px;
  color: #ffcc00; text-shadow: 0 0 40px #ffcc0099;
  margin-bottom: 10px;
}
#winnerName {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.6rem; letter-spacing: 3px; color: #fff;
}
#winnerImg {
  width: 150px; height: 150px; border-radius: 50%;
  object-fit: cover; border: 5px solid gold;
  margin-top: 16px; display: none;
}

#overlay {
  position: fixed; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: #0a0a0f;
  z-index: 50;
}
#overlay h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 4rem; letter-spacing: 6px;
  color: #ff6b2b; text-shadow: 0 0 30px #ff6b2b88;
  margin-bottom: 8px;
}
#overlay p { color: #6666aa; font-size: .95rem; }
#marblePreview {
  display: flex; flex-wrap: wrap; gap: 12px;
  justify-content: center; margin-top: 28px; max-width: 500px;
}
.previewBall {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  font-size: .75rem; color: #aaa; font-weight: 700;
}
.previewBall .ball {
  width: 54px; height: 54px; border-radius: 50%; object-fit: cover;
  border: 3px solid #ffffff33;
}
</style>
</head>
<body>

<div id="overlay">
  <h1>&#x1f3b1; MARBLE RACE</h1>
  <p>Esperando al host&#x2026;</p>
  <div id="marblePreview"></div>
</div>

<canvas id="c"></canvas>

<div id="hud">
  <div id="roundLabel">RONDA 1</div>
  <div id="leaderHud" style="display:none">
    <img id="leaderAvatar" src="" alt="">
    <div id="leaderName">&mdash;</div>
  </div>
</div>

<div id="volBox">
  <div id="volIcon">&#x1f50a;</div>
  <label>Volumen</label>
  <input type="range" id="volSlider" min="0" max="1" step="0.05" value="0.6">
</div>

<div id="winner">
  <h1>&#x1f3c6; GANADOR &#x1f3c6;</h1>
  <div id="winnerName"></div>
  <img id="winnerImg" src="" alt="">
</div>

<script>
const WORLD_W  = 800;
const TRACK_H  = 7000;
const FINISH_Y = TRACK_H - 200;
const R        = 22;
const FAN_TOP  = 2700;
const FAN_BOT  = 4800;

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W = window.innerWidth;
let H = window.innerHeight;
canvas.width  = W;
canvas.height = H;
window.addEventListener('resize', () => {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = W;
  canvas.height = H;
});

function scaleX(x) { return x * (W / WORLD_W); }
function scaleY(y) { return y; }
function scaleLen(l) { return l * (W / WORLD_W); }

let marbles     = [];
let positions   = [];
let trackBodies = [];
let state       = { phase: 'setup', round: 1, currentLeader: null };
let leaderIdNow = null;
let raceEnded   = false;
let cameraY     = 0;
let fanPhase    = 0;

let userVolume = 0.6;

document.getElementById('volSlider').addEventListener('input', e => {
  userVolume = parseFloat(e.target.value);
  document.getElementById('volIcon').textContent =
    userVolume === 0 ? '\u{1f507}' : userVolume < 0.4 ? '\u{1f509}' : '\u{1f50a}';
});

// ─── AUDIO: SIN CACHE ──────────────────────────────────────────────
let currentAudio  = null;
let currentAudioId = null;
let audioFader    = null;

function stopAudioCompletely() {
  if (audioFader) { clearInterval(audioFader); audioFader = null; }
  if (currentAudio) {
    try {
      currentAudio.pause();
      currentAudio.currentTime = 0;
      currentAudio.loop = false;
      currentAudio.src = '';
      currentAudio.load();
    } catch (e) {}
    currentAudio = null;
  }
  currentAudioId = null;
  leaderIdNow = null;
}

function playLeaderAudio(leaderId) {
  if (leaderId === currentAudioId && currentAudio) return;
  stopAudioCompletely();
  currentAudioId = leaderId;
  if (!leaderId) return;

  const marble = marbles.find(m => m.id === leaderId);
  if (!marble || !marble.sound) return;

  const audio = new Audio(marble.sound);
  audio.loop = true;
  audio.volume = 0;
  currentAudio = audio;

  const startFadeIn = () => {
    if (!currentAudio || currentAudio !== audio) return;
    audio.play().catch(() => {});
    let vol = 0;
    audioFader = setInterval(() => {
      if (!currentAudio || currentAudio !== audio) {
        clearInterval(audioFader);
        audioFader = null;
        return;
      }
      vol = Math.min(userVolume, vol + 0.04);
      audio.volume = vol;
      if (vol >= userVolume) {
        clearInterval(audioFader);
        audioFader = null;
      }
    }, 60);
  };

  if (audio.readyState >= 2) {
    startFadeIn();
  } else {
    audio.addEventListener('canplaythrough', startFadeIn, { once: true });
    audio.load();
  }
}

// ─── HUD ───────────────────────────────────────────────────────────
function updateLeaderHud(leaderId) {
  const m   = marbles.find(m => m.id === leaderId);
  const hud = document.getElementById('leaderHud');
  if (!m) { hud.style.display = 'none'; return; }
  hud.style.display = 'flex';
  document.getElementById('leaderName').textContent = m.name;
  const av = document.getElementById('leaderAvatar');
  if (m.image) { av.src = m.image; av.style.display = 'block'; }
  else         { av.style.display = 'none'; }
}

// ─── DIBUJO ────────────────────────────────────────────────────────
function drawTrack() {
  ctx.save();

  const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#0d0d1a');
  bgGrad.addColorStop(1, '#1a0d0d');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  ctx.strokeStyle = '#ffffff06';
  ctx.lineWidth = 1;
  for (let gx = 0; gx < W; gx += 60) {
    ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke();
  }
  for (let gy = -cameraY % 60; gy < H; gy += 60) {
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
  }

  const finY = scaleY(FINISH_Y) - cameraY;
  if (finY > -40 && finY < H + 40) {
    const metaGrad = ctx.createLinearGradient(0, finY - 20, 0, finY + 20);
    metaGrad.addColorStop(0, '#ffcc0000');
    metaGrad.addColorStop(0.5, '#ffcc0044');
    metaGrad.addColorStop(1, '#ffcc0000');
    ctx.fillStyle = metaGrad;
    ctx.fillRect(0, finY - 20, W, 40);

    ctx.strokeStyle = '#ffcc00';
    ctx.lineWidth   = 3;
    ctx.setLineDash([20, 10]);
    ctx.beginPath();
    ctx.moveTo(0, finY); ctx.lineTo(W, finY);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.font = '900 18px Nunito';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffcc00';
    ctx.shadowColor = '#ffcc00';
    ctx.shadowBlur  = 16;
    ctx.fillText('\u{1f3c1}  M E T A  \u{1f3c1}', W / 2, finY - 10);
    ctx.shadowBlur = 0;
  }

  // ─── ZONA DEL VENTILADOR ────────────────────────────────────────
  const fanTop = scaleY(FAN_TOP) - cameraY;
  const fanBot = scaleY(FAN_BOT) - cameraY;
  if (fanBot > 0 && fanTop < H) {
    const visTop = Math.max(0, fanTop);
    const visBot = Math.min(H, fanBot);
    const visH   = visBot - visTop;

    ctx.fillStyle = `rgba(0, 150, 255, ${0.06 + 0.04 * Math.sin(Date.now() * 0.003)})`;
    ctx.fillRect(0, visTop, W, visH);

    ctx.strokeStyle = `rgba(100, 200, 255, ${0.15 + 0.08 * Math.sin(Date.now() * 0.004)})`;
    ctx.lineWidth = 2;
    for (let lx = 0; lx < W; lx += 35) {
      const wx = lx + fanPhase * 30;
      if (wx < -10 || wx > W + 10) continue;
      ctx.setLineDash([8, 12]);
      ctx.beginPath();
      ctx.moveTo(wx, visTop);
      ctx.lineTo(wx + 15 + fanPhase * 10, visBot);
      ctx.stroke();
    }
    ctx.setLineDash([]);

    ctx.font = '700 11px Nunito';
    ctx.textAlign = 'center';
    ctx.fillStyle = `rgba(100, 200, 255, ${0.3 + 0.2 * Math.sin(Date.now() * 0.003)})`;
    ctx.fillText('\u{1f4a8}  VENTILADOR  \u{1f4a8}', W / 2, visTop + 18);
  }

  trackBodies.forEach(b => {
    const sx = scaleX(b.x);
    const sy = b.y - cameraY;
    if (sy < -300 || sy > H + 300) return;

    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(b.angle);

    if (b.label === 'bumper' || b.label === 'bumper_finish') {
      const isGold = b.label === 'bumper_finish';
      const r = scaleLen(b.radius || 14);
      const color1 = isGold ? '#ffee55' : '#ffaa55';
      const color2 = isGold ? '#cc8800' : '#cc3300';
      const glow   = isGold ? '#ffcc00' : '#ff6b2b';

      const halo = ctx.createRadialGradient(0, 0, r * 0.5, 0, 0, r * 1.8);
      halo.addColorStop(0, glow + '55');
      halo.addColorStop(1, glow + '00');
      ctx.beginPath();
      ctx.arc(0, 0, r * 1.8, 0, Math.PI * 2);
      ctx.fillStyle = halo;
      ctx.fill();

      const grad = ctx.createRadialGradient(-r * 0.3, -r * 0.3, 1, 0, 0, r);
      grad.addColorStop(0, color1);
      grad.addColorStop(1, color2);
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.shadowColor = glow;
      ctx.shadowBlur  = 18;
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = isGold ? '#ffee99' : '#ff9944';
      ctx.lineWidth = 2;
      ctx.stroke();

    } else if (b.label === 'spinner') {
      const rw = scaleLen(b.rw);
      const rh = scaleLen(b.rh);
      const grad = ctx.createLinearGradient(-rw / 2, -rh / 2, rw / 2, rh / 2);
      grad.addColorStop(0, '#ff3366');
      grad.addColorStop(1, '#990033');
      ctx.fillStyle = grad;
      ctx.shadowColor = '#ff3366';
      ctx.shadowBlur  = 14;
      ctx.fillRect(-rw / 2, -rh / 2, rw, rh);
      ctx.shadowBlur = 0;
      ctx.strokeStyle = '#ff6699';
      ctx.lineWidth = 2;
      ctx.strokeRect(-rw / 2, -rh / 2, rw, rh);
      ctx.fillStyle = '#ffffff44';
      ctx.fillRect(-rw / 2, -rh / 2, rw * 0.15, rh);
      ctx.fillRect(rw / 2 - rw * 0.15, -rh / 2, rw * 0.15, rh);

    } else if (b.label === 'pendulum') {
      const rw = scaleLen(b.rw);
      const rh = scaleLen(b.rh);
      const grad = ctx.createLinearGradient(-rw / 2, -rh / 2, rw / 2, rh / 2);
      grad.addColorStop(0, '#33ffaa');
      grad.addColorStop(1, '#009966');
      ctx.fillStyle = grad;
      ctx.shadowColor = '#33ffaa';
      ctx.shadowBlur  = 12;
      ctx.fillRect(-rw / 2, -rh / 2, rw, rh);
      ctx.shadowBlur = 0;
      ctx.strokeStyle = '#66ffcc';
      ctx.lineWidth = 2;
      ctx.strokeRect(-rw / 2, -rh / 2, rw, rh);
      ctx.beginPath();
      ctx.arc(rw / 2 - 8, 0, rh * 0.6, 0, Math.PI * 2);
      ctx.fillStyle = '#ffffff33';
      ctx.fill();

    } else if (b.rw !== null && b.rh !== null) {
      const rw = scaleLen(b.rw);
      const rh = scaleLen(b.rh);

      if (b.label === 'wall') {
        const wallGrad = ctx.createLinearGradient(-rw / 2, 0, rw / 2, 0);
        wallGrad.addColorStop(0, '#1a1a33');
        wallGrad.addColorStop(0.5, '#2a2a55');
        wallGrad.addColorStop(1, '#1a1a33');
        ctx.fillStyle = wallGrad;
        ctx.fillRect(-rw / 2, -rh / 2, rw, rh);
      } else if (b.label === 'floor') {
        ctx.fillStyle = '#111122';
        ctx.fillRect(-rw / 2, -rh / 2, rw, rh);
        ctx.strokeStyle = '#3333aa44';
        ctx.lineWidth = 2;
        ctx.strokeRect(-rw / 2, -rh / 2, rw, rh);
      } else {
        const rampGrad = ctx.createLinearGradient(0, -rh / 2, 0, rh / 2);
        rampGrad.addColorStop(0, '#6677dd');
        rampGrad.addColorStop(1, '#334499');
        ctx.fillStyle = rampGrad;
        ctx.shadowColor = '#8899ff44';
        ctx.shadowBlur  = 10;
        ctx.fillRect(-rw / 2, -rh / 2, rw, rh);
        ctx.shadowBlur = 0;
        ctx.strokeStyle = '#8899ff';
        ctx.lineWidth   = 1.5;
        ctx.strokeRect(-rw / 2, -rh / 2, rw, rh);
        ctx.strokeStyle = '#aabbff88';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(-rw / 2, -rh / 2);
        ctx.lineTo(rw / 2, -rh / 2);
        ctx.stroke();
      }
    }
    ctx.restore();
  });
  ctx.restore();
}

const marbleImages = {};
function preloadImages() {
  marbles.forEach(m => {
    if (m.image && !marbleImages[m.id]) {
      const img = new Image();
      img.src = m.image;
      marbleImages[m.id] = img;
    }
  });
}

function drawMarbles() {
  const scaledR = scaleLen(R);
  positions.forEach(pos => {
    const m = marbles.find(m => m.id === pos.id);
    if (!m) return;
    const sx = scaleX(pos.x);
    const sy = pos.y - cameraY;
    if (sy < -60 || sy > H + 60) return;

    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(pos.angle);
    ctx.shadowColor = '#00000066';
    ctx.shadowBlur  = 8;

    const img = marbleImages[m.id];
    if (img && img.complete && img.naturalWidth > 0) {
      ctx.beginPath();
      ctx.arc(0, 0, scaledR, 0, Math.PI * 2);
      ctx.clip();
      ctx.drawImage(img, -scaledR, -scaledR, scaledR * 2, scaledR * 2);
    } else {
      const grad = ctx.createRadialGradient(-scaledR * 0.35, -scaledR * 0.35, 2, 0, 0, scaledR);
      grad.addColorStop(0, lighten(m.color, 60));
      grad.addColorStop(1, m.color);
      ctx.beginPath();
      ctx.arc(0, 0, scaledR, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
    }

    if (pos.id === leaderIdNow) {
      ctx.beginPath();
      ctx.arc(0, 0, scaledR + 3, 0, Math.PI * 2);
      ctx.strokeStyle = '#ffcc00';
      ctx.lineWidth   = 3;
      ctx.shadowColor = '#ffcc00';
      ctx.shadowBlur  = 14;
      ctx.stroke();
    }
    ctx.restore();

    ctx.font = '900 12px Nunito';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.shadowColor = '#000';
    ctx.shadowBlur  = 4;
    ctx.fillText(m.name, sx, sy + scaledR + 14);
    ctx.shadowBlur = 0;
  });
}

function lighten(hex, amt) {
  const n = parseInt(hex.replace('#', ''), 16);
  const r = Math.min(255, (n >> 16) + amt);
  const g = Math.min(255, ((n >> 8) & 0xff) + amt);
  const b = Math.min(255, (n & 0xff) + amt);
  return `rgb(${r},${g},${b})`;
}

function updateCamera() {
  if (!positions.length) return;
  const leader  = positions.reduce((a, b) => a.y > b.y ? a : b);
  const targetY = leader.y - H * 0.35;
  cameraY += (targetY - cameraY) * 0.08;
  cameraY  = Math.max(0, cameraY);
}

function loop() {
  if (state.phase === 'racing' || state.phase === 'results') {
    ctx.clearRect(0, 0, W, H);
    updateCamera();
    drawTrack();
    drawMarbles();
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function renderMarblePreview() {
  const el = document.getElementById('marblePreview');
  el.innerHTML = marbles.map(m => {
    const ballStyle = m.image
      ? `background:url('${m.image}') center/cover; border-color:${m.color};`
      : `background:${m.color};`;
    return `
      <div class="previewBall">
        <div class="ball" style="${ballStyle}"></div>
        <span>${m.name}</span>
      </div>`;
  }).join('');
}

const socket = io();

socket.on('stateUpdate', s => {
  state   = s;
  marbles = s.marbles || [];
  preloadImages();
  renderMarblePreview();
  document.getElementById('roundLabel').textContent = 'RONDA ' + s.round;

  const overlay = document.getElementById('overlay');
  if (s.phase === 'racing') {
    overlay.style.display = 'none';
    document.getElementById('winner').style.display = 'none';
    raceEnded = false;
  } else if (s.phase === 'lobby' || s.phase === 'setup') {
    overlay.style.display = 'flex';
    document.getElementById('overlay').querySelector('p').textContent =
      s.phase === 'lobby' ? 'La carrera est\u00e1 a punto de comenzar\u2026' : 'Esperando al host\u2026';
  } else if (s.phase === 'ready') {
    overlay.style.display = 'flex';
    document.getElementById('overlay').querySelector('p').textContent = '\u00a1Preparados!';
  }

  if (s.currentLeader && s.phase === 'racing') {
    playLeaderAudio(s.currentLeader);
    updateLeaderHud(s.currentLeader);
  }
});

socket.on('trackData', data => {
  trackBodies = data;
  cameraY     = 0;
});

socket.on('positions', data => {
  positions = data.positions || data;
  if (data.fanPhase !== undefined) fanPhase = data.fanPhase;
});

socket.on('leaderChange', leaderId => {
  playLeaderAudio(leaderId);
  updateLeaderHud(leaderId);
});

socket.on('raceWinner', data => {
  if (raceEnded) return;
  raceEnded = true;
  stopAudioCompletely();

  const m  = marbles.find(m => m.id === data.winnerId);
  const el = document.getElementById('winner');
  el.style.display = 'flex';
  document.getElementById('winnerName').textContent = m ? m.name : '???';
  const img = document.getElementById('winnerImg');
  if (m && m.image) { img.src = m.image; img.style.display = 'block'; }
  else              { img.style.display = 'none'; }
});

socket.on('raceReset', () => {
  stopAudioCompletely();
  raceEnded   = false;
  positions   = [];
  trackBodies = [];
  cameraY     = 0;
  document.getElementById('winner').style.display  = 'none';
  document.getElementById('overlay').style.display = 'flex';
  document.getElementById('overlay').querySelector('p').textContent = '\u00a1Preparados para la siguiente!';
  document.getElementById('leaderHud').style.display = 'none';
});
</script>
</body>
</html>
