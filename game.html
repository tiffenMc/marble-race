<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STICK ARENA</title>
<script src="/socket.io/socket.io.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { background:#0a0a0f; overflow:hidden; font-family:'Nunito',sans-serif; }
canvas { display:block; }
#hud { position:fixed; top:0; left:0; right:0; display:flex; align-items:center; justify-content:space-between; padding:8px 14px; background:linear-gradient(#000000cc,transparent); pointer-events:none; z-index:20; }
#roundLabel { font-family:'Bebas Neue',sans-serif; font-size:1.2rem; letter-spacing:3px; color:#ffcc00; }
#winner { display:none; position:fixed; inset:0; flex-direction:column; align-items:center; justify-content:center; background:#000000dd; color:white; z-index:40; text-align:center; }
#winner h1 { font-family:'Bebas Neue',sans-serif; font-size:3.5rem; letter-spacing:6px; color:#ffcc00; text-shadow:0 0 40px #ffcc0099; margin-bottom:10px; }
#winnerName { font-family:'Bebas Neue',sans-serif; font-size:2.2rem; letter-spacing:3px; color:#fff; }
#winnerImg { width:100px; height:100px; border-radius:50%; object-fit:cover; border:5px solid gold; margin-top:14px; display:none; }
#overlay { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#0a0a0f; z-index:50; }
#overlay h1 { font-family:'Bebas Neue',sans-serif; font-size:2.8rem; letter-spacing:6px; color:#ff4444; text-shadow:0 0 30px #ff444488; margin-bottom:8px; }
#overlay p { color:#6666aa; font-size:.9rem; }
#volBox { position:fixed; bottom:12px; right:12px; background:#13131eee; border:1px solid #ffffff22; border-radius:10px; padding:8px 12px; display:flex; flex-direction:column; align-items:center; gap:4px; z-index:30; pointer-events:all; }
#volBox label { font-size:.6rem; font-weight:700; color:#6666aa; text-transform:uppercase; letter-spacing:1px; }
#volSlider { -webkit-appearance:none; width:80px; height:4px; border-radius:2px; background:#333; outline:none; cursor:pointer; }
#volSlider::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:#ff4444; cursor:pointer; }
#volIcon { font-size:1rem; }
.marblePreview { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:16px; max-width:400px; }
.previewBall { display:flex; flex-direction:column; align-items:center; gap:3px; font-size:.65rem; color:#aaa; font-weight:700; }
.previewBall .ball { width:40px; height:40px; border-radius:50%; object-fit:cover; border:3px solid #ffffff33; }
</style>
</head>
<body>
<div id="overlay"><h1>&#x2694; STICK ARENA &#x2694;</h1><p>Esperando al host&#x2026;</p><div id="marblePreview" class="marblePreview"></div></div>
<canvas id="c"></canvas>
<div id="hud"><div id="roundLabel">RONDA 1</div><div style="color:#888;font-size:.75rem">&#x1f3ad; COLISEO &#x1f3ad;</div><div></div></div>
<div id="volBox"><div id="volIcon">&#x1f50a;</div><label>Vol</label><input type="range" id="volSlider" min="0" max="1" step="0.05" value="0.6"></div>
<div id="winner"><h1>&#x1f3c6; CAMPE&#xd3;N &#x1f3c6;</h1><div id="winnerName"></div><img id="winnerImg" src="" alt=""><div style="color:#888;font-size:.8rem;margin-top:8px">&#x1f3b5; Tema del campe&#xf3;n &#x1f3b5;</div></div>

<script>
const W_W=800,W_H=500;
const c=document.getElementById('c'),ctx=c.getContext('2d');
let W=window.innerWidth,H=window.innerHeight;
c.width=W;c.height=H;
window.addEventListener('resize',()=>{W=c.width=window.innerWidth;H=c.height=window.innerHeight;});
function sx(x){return x*(W/W_W)}function sy(y){return y*(H/W_H)}function sl(l){return l*Math.min(W/W_W,H/W_H)}
let marbles=[],gladState=[],projState=[],gamePhase='setup',userVolume=0.6,currentTheme=null,prevHp={};
document.getElementById('volSlider').addEventListener('input',e=>{userVolume=parseFloat(e.target.value);document.getElementById('volIcon').textContent=userVolume===0?'\u{1f507}':userVolume<0.4?'\u{1f509}':'\u{1f50a}';});
let curAudio=null;
function stopAudio(){if(curAudio){try{curAudio.pause();curAudio.currentTime=0;curAudio.src='';curAudio.load()}catch(e){}curAudio=null}}

let parts=[];
function spawnParts(x,y,col,n){for(let i=0;i<(n||6);i++)parts.push({x,y,col,vx:(Math.random()-0.5)*5,vy:-Math.random()*5-1,life:20+Math.random()*15})}
function spawnDmg(x,y,dmg,crit){parts.push({x,y,col:crit?'#ff4400':'#ffcc00',vx:(Math.random()-0.5)*1,vy:-2-Math.random()*1,life:40,text:(crit?'\u{26a1}':'')+dmg,size:crit?22:14})}
function updParts(){for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life--;if(p.life<=0)parts.splice(i,1)}}
function drwParts(){parts.forEach(p=>{if(p.text){ctx.globalAlpha=Math.min(1,p.life/20);ctx.font=`900 ${sl(p.size)}px Nunito`;ctx.textAlign='center';ctx.fillStyle=p.col;ctx.shadowColor='#000';ctx.shadowBlur=sl(6);ctx.fillText(p.text,sx(p.x),sy(p.y));ctx.shadowBlur=0}else{ctx.globalAlpha=p.life/25;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(sx(p.x),sy(p.y),sl(1.5+(1-p.life/25)*2),0,Math.PI*2);ctx.fill()}});ctx.globalAlpha=1}

const PLATS=[{x:W_W/2,y:460,w:W_W,h:30},{x:150,y:365,w:160,h:12},{x:500,y:365,w:180,h:12},{x:350,y:290,w:200,h:12},{x:120,y:290,w:110,h:12},{x:620,y:290,w:110,h:12},{x:400,y:215,w:160,h:12},{x:220,y:215,w:100,h:12},{x:580,y:215,w:100,h:12},{x:400,y:145,w:120,h:12}];

function drawBG(){const t=currentTheme;if(t&&t.bg){const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,t.bg[0]);g.addColorStop(0.3,t.bg[1]);g.addColorStop(0.7,t.bg[2]);g.addColorStop(1,'#000');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.fillStyle=t.ac+'15';for(let i=0;i<15;i++)ctx.fillRect(Math.random()*W,Math.random()*H*0.5,2,1)}else{const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#0a0a1a');g.addColorStop(0.3,'#1a0d1a');g.addColorStop(0.6,'#2a1508');g.addColorStop(1,'#0a0500');ctx.fillStyle=g;ctx.fillRect(0,0,W,H)}}

function drawPlats(){PLATS.forEach(p=>{const t=currentTheme;const x=sx(p.x),y=sy(p.y),w=sx(p.w),h=sy(p.h);const c1=t&&t.plat?t.plat[0]:'#3a2a1a',c2=t&&t.plat?t.plat[1]:'#2a1a0a',ac=t&&t.ac?t.ac:'#ffcc00';const g=ctx.createLinearGradient(x-w/2,y-h/2,x+w/2,y+h/2);g.addColorStop(0,c1);g.addColorStop(0.5,c2);g.addColorStop(1,'#111');ctx.fillStyle=g;ctx.shadowColor=ac+'22';ctx.shadowBlur=sl(6);ctx.fillRect(x-w/2,y-h/2,w,h);ctx.shadowBlur=0;ctx.strokeStyle=ac+'44';ctx.lineWidth=sl(1);ctx.strokeRect(x-w/2,y-h/2,w,h);ctx.fillStyle=ac+'15';ctx.fillRect(x-w/2,y-h/2,w,sl(2))})}

function drawRagdoll(g) {
  const p = g.parts;
  if (!p) return;
  const m = marbles.find(mm => mm.id === g.id);
  const col = m ? m.color : '#ff4444';
  const name = m ? m.name : '?';
  const img = m && marbleImages[m.id];
  const torso = p.torso, head = p.head;

  // ── Body parts to draw ──
  const parts = [
    { key: 'lowerLegL', w: 5, h: 12 }, { key: 'lowerLegR', w: 5, h: 12 },
    { key: 'upperLegL', w: 6, h: 14 }, { key: 'upperLegR', w: 6, h: 14 },
    { key: 'lowerArmL', w: 4, h: 11 }, { key: 'lowerArmR', w: 4, h: 11 },
    { key: 'upperArmL', w: 5, h: 13 }, { key: 'upperArmR', w: 5, h: 13 },
  ];

  // Draw shadow under torso
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(sx(torso.x) + sl(2), sy(torso.y) + sl(4), sl(10), sl(4), 0, 0, Math.PI * 2);
  ctx.fill();

  // Draw body parts (back to front order)
  parts.forEach(part => {
    const bp = p[part.key];
    if (!bp) return;
    ctx.save();
    ctx.translate(sx(bp.x), sy(bp.y));
    ctx.rotate(bp.angle || 0);
    ctx.fillStyle = col;
    ctx.shadowColor = col + '44';
    ctx.shadowBlur = sl(3);
    roundRect(ctx, -sl(part.w / 2), -sl(part.h / 2), sl(part.w), sl(part.h), sl(2));
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = lighten(col, 40);
    ctx.lineWidth = sl(0.8);
    roundRect(ctx, -sl(part.w / 2), -sl(part.h / 2), sl(part.w), sl(part.h), sl(2));
    ctx.stroke();
    ctx.restore();
  });

  // Draw torso
  ctx.save();
  ctx.translate(sx(torso.x), sy(torso.y));
  ctx.rotate(torso.angle || 0);
  ctx.fillStyle = col;
  ctx.shadowColor = col + '66';
  ctx.shadowBlur = sl(6);
  if (img && img.complete && img.naturalWidth > 0) {
    ctx.save();
    roundRect(ctx, -sl(8), -sl(11), sl(16), sl(22), sl(3));
    ctx.clip();
    ctx.drawImage(img, -sl(8), -sl(11), sl(16), sl(22));
    ctx.restore();
  } else {
    roundRect(ctx, -sl(8), -sl(11), sl(16), sl(22), sl(3));
    ctx.fill();
  }
  ctx.shadowBlur = 0;
  ctx.strokeStyle = lighten(col, 50);
  ctx.lineWidth = sl(1);
  roundRect(ctx, -sl(8), -sl(11), sl(16), sl(22), sl(3));
  ctx.stroke();
  ctx.restore();

  // Draw head
  const hr = sl(7);
  ctx.save();
  ctx.translate(sx(head.x), sy(head.y));
  ctx.beginPath();
  ctx.arc(0, 0, hr, 0, Math.PI * 2);
  ctx.fillStyle = col;
  ctx.shadowColor = col + '66';
  ctx.shadowBlur = sl(5);
  if (img && img.complete && img.naturalWidth > 0) {
    ctx.save();
    ctx.clip();
    ctx.drawImage(img, -hr, -hr, hr * 2, hr * 2);
    ctx.restore();
  } else {
    ctx.fill();
  }
  ctx.shadowBlur = 0;
  ctx.strokeStyle = lighten(col, 60);
  ctx.lineWidth = sl(1.2);
  ctx.stroke();
  ctx.restore();

  // ── HP bar (above head) ──
  const bw = sl(28), bh = sl(4);
  const hpY = sy(head.y) - hr - sl(10);
  ctx.fillStyle = '#1a0000cc';
  roundRect(ctx, sx(torso.x) - bw / 2, hpY, bw, bh, sl(2));
  ctx.fill();
  const pct = g.hp / g.maxHp;
  const hc = pct > 0.5 ? '#39ff14' : pct > 0.25 ? '#ffcc00' : '#ff2244';
  ctx.shadowColor = hc + '88';
  ctx.shadowBlur = sl(4);
  ctx.fillStyle = hc;
  roundRect(ctx, sx(torso.x) - bw / 2 + 1, hpY + 1, (bw - 2) * pct, bh - 2, sl(1.5));
  ctx.fill();
  ctx.shadowBlur = 0;

  // HP text
  ctx.font = `700 ${sl(7)}px Nunito`;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.shadowColor = '#000';
  ctx.shadowBlur = sl(3);
  ctx.fillText(Math.ceil(g.hp), sx(torso.x), hpY + bh + sl(7));

  // Name
  ctx.fillStyle = '#ddd';
  ctx.fillText(name, sx(torso.x), hpY - sl(2));
  ctx.shadowBlur = 0;

  // ── Charge bar ──
  if (g.state === 'charge' && g.chargePct < 1) {
    const cbw = sl(20), cbh = sl(2);
    const cby = hpY - sl(1);
    ctx.fillStyle = '#333';
    roundRect(ctx, sx(torso.x) - cbw / 2, cby, cbw, cbh, sl(1));
    ctx.fill();
    ctx.fillStyle = '#ffaa00';
    roundRect(ctx, sx(torso.x) - cbw / 2, cby, cbw * g.chargePct, cbh, sl(1));
    ctx.fill();
  }

  // ── Weapon icon (near attacking hand) ──
  if (g.weapon && g.hp > 0) {
    const atkArm = g.facingRight ? p.lowerArmR : p.lowerArmL;
    if (atkArm) {
      ctx.font = `${sl(12)}px Arial`;
      ctx.textAlign = 'center';
      ctx.fillStyle = '#fff';
      ctx.shadowColor = '#000';
      ctx.shadowBlur = sl(4);
      ctx.fillText(g.weapon.icon, sx(atkArm.x) + (g.facingRight ? sl(8) : -sl(8)), sy(atkArm.y) + sl(2));
      ctx.shadowBlur = 0;
    }
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawProjectiles(){projState.forEach(p=>{ctx.fillStyle='#ffcc00';ctx.shadowColor='#ffcc00';ctx.shadowBlur=sl(10);ctx.beginPath();ctx.arc(sx(p.x),sy(p.y),sl(3),0,Math.PI*2);ctx.fill();ctx.shadowBlur=0})}

const marbleImages={};
function preloadImages(){marbles.forEach(m=>{if(m.image&&!marbleImages[m.id]){const img=new Image();img.src=m.image;marbleImages[m.id]=img}})}
function lighten(hex,a){const n=parseInt(hex.replace('#',''),16);return`rgb(${Math.min(255,(n>>16)+a)},${Math.min(255,((n>>8)&255)+a)},${Math.min(255,(n&255)+a)})`}
function darken(hex,a){const n=parseInt(hex.replace('#',''),16);return`rgb(${Math.max(0,(n>>16)-a)},${Math.max(0,((n>>8)&255)-a)},${Math.max(0,(n&255)-a)})`}

function loop(){ctx.clearRect(0,0,W,H);drawBG();drawPlats();gladState.forEach(g=>drawRagdoll(g));drawProjectiles();updParts();drwParts();requestAnimationFrame(loop)}
requestAnimationFrame(loop);

function renderPreview(){const el=document.getElementById('marblePreview');el.innerHTML=marbles.map(m=>{const s=m.image?`background:url('${m.image}') center/cover; border-color:${m.color};`:`background:${m.color};`;return`<div class="previewBall"><div class="ball" style="${s}"></div><span>${m.name}</span></div>`}).join('')}

const socket=io();
socket.on('stateUpdate',s=>{gamePhase=s.phase;marbles=s.marbles||[];if(s.theme)currentTheme=s.theme;preloadImages();renderPreview();document.getElementById('roundLabel').textContent='RONDA '+s.round;const ov=document.getElementById('overlay');if(s.phase==='racing'){ov.style.display='none';document.getElementById('winner').style.display='none';gladState=[];prevHp={}}else if(s.phase!=='results'){ov.style.display='flex';const txt={setup:'Configurando...',lobby:'Esperando...',ready:'Preparados...'};document.querySelector('#overlay p').textContent=txt[s.phase]||s.phase}});
socket.on('battleState',data=>{gladState=data.gladiators||[];projState=data.projectiles||[];gladState.forEach(g=>{const p=prevHp[g.id];if(p!==undefined&&p>g.hp&&g.hp>0){const tx=g.parts&&g.parts.torso?g.parts.torso.x:0;const ty=g.parts&&g.parts.torso?g.parts.torso.y:0;spawnParts(tx,ty,'#ffcc00',5);if(g.dmg)spawnDmg(tx,ty-15,g.dmg,g.crit)}prevHp[g.id]=g.hp})});
socket.on('battleWinner',data=>{stopAudio();document.getElementById('overlay').style.display='none';document.getElementById('winner').style.display='flex';document.getElementById('winnerName').textContent=data.winnerName||'Nadie';const m=marbles.find(mm=>mm.id===data.winnerId);if(m&&m.image){document.getElementById('winnerImg').src=m.image;document.getElementById('winnerImg').style.display='block'}else{document.getElementById('winnerImg').style.display='none'}if(data.winnerSound){const a=new Audio(data.winnerSound);a.loop=true;a.volume=userVolume;a.play().catch(()=>{});curAudio=a}});
socket.on('battleReset',()=>{stopAudio();gladState=[];projState=[];parts=[];prevHp={};document.getElementById('winner').style.display='none';document.getElementById('overlay').style.display='flex';document.querySelector('#overlay p').textContent='\u00a1Preparados!'});
</script>
</body>
</html>
