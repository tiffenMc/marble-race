<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MARBLE RACE</title>
<script src="/socket.io/socket.io.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a0f; overflow: hidden; font-family: 'Nunito', sans-serif; }
canvas { display: block; }
#hud {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 18px;
  background: linear-gradient(#000000cc, transparent);
  pointer-events: none; z-index: 20;
}
#roundLabel {
  font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem;
  letter-spacing: 4px; color: #ffcc00; text-shadow: 0 0 12px #ffcc0088;
}
#leaderHud {
  display: flex; align-items: center; gap: 10px;
  background: #ffffff15; border-radius: 30px; padding: 6px 16px;
}
#leaderAvatar { width: 36px; height: 36px; border-radius: 50%; border: 2px solid gold; object-fit: cover; }
#leaderName { font-weight: 900; font-size: .9rem; color: #ffcc00; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#volBox {
  position: fixed; bottom: 20px; right: 20px;
  background: #13131eee; border: 1px solid #ffffff22; border-radius: 14px;
  padding: 14px 18px; display: flex; flex-direction: column; align-items: center; gap: 8px;
  z-index: 30;
}
#volBox label { font-size: .7rem; font-weight: 700; color: #6666aa; text-transform: uppercase; letter-spacing: 1px; }
#volSlider { -webkit-appearance: none; width: 120px; height: 6px; border-radius: 3px; background: #333; outline: none; cursor: pointer; }
#volSlider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #ff6b2b; cursor: pointer; }
#volIcon { font-size: 1.4rem; }
#winner {
  display: none; position: fixed; inset: 0;
  flex-direction: column; align-items: center; justify-content: center;
  background: #000000cc; color: white; z-index: 40; text-align: center;
}
#winner h1 { font-family: 'Bebas Neue', sans-serif; font-size: 4rem; letter-spacing: 6px; color: #ffcc00; text-shadow: 0 0 40px #ffcc0099; margin-bottom: 10px; }
#winnerName { font-family: 'Bebas Neue', sans-serif; font-size: 2.6rem; letter-spacing: 3px; color: #fff; }
#winnerImg { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 5px solid gold; margin-top: 16px; display: none; }
#overlay {
  position: fixed; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: #0a0a0f; z-index: 50;
}
#overlay h1 { font-family: 'Bebas Neue', sans-serif; font-size: 4rem; letter-spacing: 6px; color: #ff6b2b; text-shadow: 0 0 30px #ff6b2b88; margin-bottom: 8px; }
#overlay p { color: #6666aa; font-size: .95rem; }
#marblePreview { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 28px; max-width: 500px; }
.previewBall { display: flex; flex-direction: column; align-items: center; gap: 6px; font-size: .75rem; color: #aaa; font-weight: 700; }
.previewBall .ball { width: 54px; height: 54px; border-radius: 50%; object-fit: cover; border: 3px solid #ffffff33; }
/* Cuenta atrás */
#countdown {
  display: none; position: fixed; inset: 0;
  align-items: center; justify-content: center;
  z-index: 45; pointer-events: none;
}
#countdownNum {
  font-family: 'Bebas Neue', sans-serif; font-size: 20vw;
  color: #ffcc00; text-shadow: 0 0 60px #ffcc00;
  animation: popIn .4s ease-out;
}
@keyframes popIn { from { transform: scale(2); opacity: 0; } to { transform: scale(1); opacity: 1; } }
</style>
</head>
<body>

<div id="overlay">
  <h1>🎱 MARBLE RACE</h1>
  <p id="overlayMsg">Esperando al host…</p>
  <div id="marblePreview"></div>
</div>

<div id="countdown"><div id="countdownNum"></div></div>

<canvas id="c"></canvas>

<div id="hud">
  <div id="roundLabel">RONDA 1</div>
  <div id="leaderHud" style="display:none">
    <img id="leaderAvatar" src="" alt="">
    <div id="leaderName">—</div>
  </div>
</div>

<div id="volBox">
  <div id="volIcon">🔊</div>
  <label>Volumen</label>
  <input type="range" id="volSlider" min="0" max="1" step="0.05" value="0.6">
</div>

<div id="winner">
  <h1>🏆 GANADOR 🏆</h1>
  <div id="winnerName"></div>
  <img id="winnerImg" src="" alt="">
</div>

<script>
// ── CONSTANTES (iguales que server.js) ──────────────────────────────────────
const WORLD_W  = 600;
const TRACK_H  = 8000;
const FINISH_Y = TRACK_H - 300;
const R        = 20;

// ── CANVAS ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W = canvas.width  = window.innerWidth;
let H = canvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
});

// Escala: el mundo lógico (WORLD_W) se estira al ancho de pantalla
// Usamos ctx.scale para que TODO (escenario + canicas) use el mismo sistema
function getScale() { return W / WORLD_W; }

// ── ESTADO ──────────────────────────────────────────────────────────────────
let marbles     = [];
let positions   = [];
let trackBodies = [];
let state       = { phase: 'setup', round: 1 };
let leaderIdNow = null;
let raceEnded   = false;
let cameraY     = 0;
let showTrack   = false;  // true desde fase 'ready' en adelante

// ── AUDIO ───────────────────────────────────────────────────────────────────
const audios = {};
let currentAudio = null;
let userVolume   = 0.6;

document.getElementById('volSlider').addEventListener('input', e => {
  userVolume = parseFloat(e.target.value);
  if (currentAudio) currentAudio.volume = userVolume;
  document.getElementById('volIcon').textContent = userVolume === 0 ? '🔇' : userVolume < 0.4 ? '🔉' : '🔊';
});

function switchLeaderAudio(leaderId) {
  if (leaderIdNow === leaderId) return;
  leaderIdNow = leaderId;
  if (currentAudio) {
    const old = currentAudio;
    const fade = setInterval(() => {
      if (old.volume > 0.05) old.volume = Math.max(0, old.volume - 0.05);
      else { old.pause(); old.currentTime = 0; clearInterval(fade); }
    }, 50);
    currentAudio = null;
  }
  if (!leaderId) return;
  const marble = marbles.find(m => m.id === leaderId);
  if (!marble || !marble.sound) return;
  if (!audios[leaderId]) { const a = new Audio(marble.sound); a.loop = true; a.volume = 0; audios[leaderId] = a; }
  const a = audios[leaderId];
  currentAudio = a;
  a.play().catch(() => {});
  const fi = setInterval(() => {
    if (a.volume < userVolume - 0.05) a.volume = Math.min(userVolume, a.volume + 0.05);
    else { a.volume = userVolume; clearInterval(fi); }
  }, 50);
}

function stopAllAudio() {
  Object.values(audios).forEach(a => { a.pause(); a.currentTime = 0; });
  currentAudio = null; leaderIdNow = null;
}

// ── HUD ─────────────────────────────────────────────────────────────────────
function updateLeaderHud(leaderId) {
  const m = marbles.find(m => m.id === leaderId);
  const hud = document.getElementById('leaderHud');
  if (!m) { hud.style.display = 'none'; return; }
  hud.style.display = 'flex';
  document.getElementById('leaderName').textContent = m.name;
  const av = document.getElementById('leaderAvatar');
  if (m.image) { av.src = m.image; av.style.display = 'block'; }
  else av.style.display = 'none';
}

// ── CUENTA ATRÁS (visual) ────────────────────────────────────────────────────
function showCountdown(cb) {
  const el  = document.getElementById('countdown');
  const num = document.getElementById('countdownNum');
  el.style.display = 'flex';
  let n = 3;
  num.textContent = n;
  const iv = setInterval(() => {
    n--;
    if (n <= 0) {
      clearInterval(iv);
      num.textContent = '¡YA!';
      setTimeout(() => { el.style.display = 'none'; cb && cb(); }, 600);
    } else {
      num.style.animation = 'none';
      void num.offsetWidth; // reflow para reiniciar animación
      num.style.animation = '';
      num.textContent = n;
    }
  }, 900);
}

// ── DIBUJO ───────────────────────────────────────────────────────────────────
const marbleImages = {};
function preloadImages() {
  marbles.forEach(m => {
    if (m.image && !marbleImages[m.id]) {
      const img = new Image(); img.src = m.image; marbleImages[m.id] = img;
    }
  });
}

function drawScene() {
  const scale = getScale();
  ctx.clearRect(0, 0, W, H);

  // Fondo
  ctx.fillStyle = '#12121f';
  ctx.fillRect(0, 0, W, H);

  // Aplicar escala y cámara en un solo ctx.setTransform
  // Esto hace que las coordenadas de dibujo sean exactamente las del servidor
  ctx.save();
  ctx.setTransform(scale, 0, 0, scale, 0, -cameraY * scale);

  // ── Línea de meta ──
  ctx.strokeStyle = '#ffcc00';
  ctx.lineWidth   = 4 / scale;
  ctx.setLineDash([16 / scale, 8 / scale]);
  ctx.beginPath();
  ctx.moveTo(0, FINISH_Y); ctx.lineTo(WORLD_W, FINISH_Y);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.font = `bold ${18/scale}px Nunito`;
  ctx.fillStyle = '#ffcc00';
  ctx.textAlign = 'center';
  ctx.fillText('🏁 META', WORLD_W / 2, FINISH_Y - 8 / scale);

  // ── Escenario ──
  trackBodies.forEach(b => {
    // Culling en coordenadas del mundo
    if (b.y < cameraY - 200 || b.y > cameraY + H / scale + 200) return;

    ctx.save();
    ctx.translate(b.x, b.y);
    if (b.angle) ctx.rotate(b.angle);

    if (b.type === 'circle') {
      ctx.beginPath();
      ctx.arc(0, 0, b.r, 0, Math.PI * 2);
      if (b.style === 'bumper') {
        ctx.fillStyle = '#ff6b2b';
        ctx.shadowColor = '#ff6b2b88'; ctx.shadowBlur = 14 / scale;
      } else {
        // peg
        ctx.fillStyle = '#cc88ff';
        ctx.shadowColor = '#cc88ff88'; ctx.shadowBlur = 10 / scale;
      }
      ctx.fill();
      ctx.shadowBlur = 0;

    } else {
      // rect (ramp o wall)
      const hw = b.w / 2, hh = b.h / 2;
      if (b.style === 'wall') {
        ctx.fillStyle = '#1e1e3a';
        ctx.fillRect(-hw, -hh, b.w, b.h);
      } else {
        // Rampa con degradado
        const grad = ctx.createLinearGradient(-hw, -hh, hw, hh);
        grad.addColorStop(0, '#5566dd');
        grad.addColorStop(1, '#3344aa');
        ctx.fillStyle = grad;
        ctx.shadowColor = '#4455cc44'; ctx.shadowBlur = 10 / scale;
        ctx.beginPath();
        ctx.roundRect(-hw, -hh, b.w, b.h, 5 / scale);
        ctx.fill();
        ctx.shadowBlur = 0;
        // Borde superior brillante
        ctx.strokeStyle = '#8899ff66';
        ctx.lineWidth = 2 / scale;
        ctx.beginPath();
        ctx.moveTo(-hw, -hh); ctx.lineTo(hw, -hh);
        ctx.stroke();
      }
    }
    ctx.restore();
  });

  // ── Canicas ──
  positions.forEach(pos => {
    const m = marbles.find(m => m.id === pos.id);
    if (!m) return;
    if (pos.y < cameraY - 100 || pos.y > cameraY + H / scale + 100) return;

    ctx.save();
    ctx.translate(pos.x, pos.y);
    ctx.rotate(pos.angle || 0);

    const isLeader = pos.id === leaderIdNow;
    if (isLeader) {
      // Halo dorado
      ctx.beginPath(); ctx.arc(0, 0, R + 5, 0, Math.PI * 2);
      ctx.fillStyle = '#ffcc0033'; ctx.fill();
    }

    const img = marbleImages[m.id];
    if (img && img.complete && img.naturalWidth > 0) {
      ctx.beginPath(); ctx.arc(0, 0, R, 0, Math.PI * 2); ctx.clip();
      ctx.drawImage(img, -R, -R, R * 2, R * 2);
    } else {
      const grad = ctx.createRadialGradient(-R * 0.3, -R * 0.3, 2, 0, 0, R);
      grad.addColorStop(0, lighten(m.color, 70));
      grad.addColorStop(1, m.color);
      ctx.beginPath(); ctx.arc(0, 0, R, 0, Math.PI * 2);
      ctx.fillStyle = grad; ctx.fill();
    }

    if (isLeader) {
      ctx.beginPath(); ctx.arc(0, 0, R, 0, Math.PI * 2);
      ctx.strokeStyle = '#ffcc00'; ctx.lineWidth = 3 / scale;
      ctx.shadowColor = '#ffcc00'; ctx.shadowBlur = 16 / scale;
      ctx.stroke(); ctx.shadowBlur = 0;
    }
    ctx.restore();

    // Nombre (en coordenadas del mundo, sin rotación)
    ctx.save();
    ctx.translate(pos.x, pos.y + R + 14 / scale);
    ctx.font = `bold ${12/scale}px Nunito`;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.shadowColor = '#000'; ctx.shadowBlur = 4 / scale;
    ctx.fillText(m.name, 0, 0);
    ctx.shadowBlur = 0;
    ctx.restore();
  });

  ctx.restore(); // quitar transform
}

function lighten(hex, amt) {
  const n = parseInt(hex.replace('#',''), 16);
  return `rgb(${Math.min(255,(n>>16)+amt)},${Math.min(255,((n>>8)&0xff)+amt)},${Math.min(255,(n&0xff)+amt)})`;
}

// ── CÁMARA ───────────────────────────────────────────────────────────────────
function updateCamera() {
  if (!positions.length && !trackBodies.length) return;
  const scale = getScale();
  let targetY;
  if (positions.length) {
    const leader = positions.reduce((a, b) => a.y > b.y ? a : b);
    targetY = leader.y - (H / scale) * 0.38;
  } else {
    targetY = 0;
  }
  cameraY += (targetY - cameraY) * 0.1;
  cameraY = Math.max(0, cameraY);
}

// ── LOOP ─────────────────────────────────────────────────────────────────────
function loop() {
  if (showTrack) {
    updateCamera();
    drawScene();
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ── OVERLAY ──────────────────────────────────────────────────────────────────
function renderMarblePreview() {
  const el = document.getElementById('marblePreview');
  el.innerHTML = marbles.map(m => {
    const s = m.image ? `background:url('${m.image}') center/cover;border-color:${m.color}` : `background:${m.color}`;
    return `<div class="previewBall"><div class="ball" style="${s}"></div><span>${m.name}</span></div>`;
  }).join('');
}

function setOverlay(msg) {
  document.getElementById('overlay').style.display = 'flex';
  document.getElementById('overlayMsg').textContent = msg;
  showTrack = false;
}

function hideOverlay() {
  document.getElementById('overlay').style.display = 'none';
}

// ── SOCKET ───────────────────────────────────────────────────────────────────
const socket = io();

socket.on('stateUpdate', s => {
  state   = s;
  marbles = s.marbles || [];
  preloadImages();
  renderMarblePreview();
  document.getElementById('roundLabel').textContent = 'RONDA ' + s.round;

  if (s.phase === 'setup') {
    setOverlay('Esperando al host…');
  } else if (s.phase === 'lobby') {
    setOverlay('La carrera está a punto de comenzar…');
  } else if (s.phase === 'ready') {
    // Mostrar escenario estático (sin canicas moviéndose)
    hideOverlay();
    showTrack = true;
    positions = [];
    cameraY   = 0;
    document.getElementById('winner').style.display = 'none';
  } else if (s.phase === 'racing') {
    hideOverlay();
    showTrack = true;
    raceEnded = false;
    document.getElementById('winner').style.display = 'none';
  }

  if (s.currentLeader && (s.phase === 'racing')) {
    switchLeaderAudio(s.currentLeader);
    updateLeaderHud(s.currentLeader);
  }
});

socket.on('trackData', data => {
  trackBodies = data;
  cameraY = 0;
  showTrack = true;
  hideOverlay();
});

socket.on('positions', data => { positions = data; });

socket.on('leaderChange', leaderId => {
  switchLeaderAudio(leaderId);
  updateLeaderHud(leaderId);
});

socket.on('countdown', () => {
  showCountdown();
});

socket.on('raceWinner', data => {
  if (raceEnded) return;
  raceEnded = true;
  stopAllAudio();
  const m = marbles.find(m => m.id === data.winnerId);
  const el = document.getElementById('winner');
  el.style.display = 'flex';
  document.getElementById('winnerName').textContent = m ? m.name : '???';
  const img = document.getElementById('winnerImg');
  if (m && m.image) { img.src = m.image; img.style.display = 'block'; }
  else img.style.display = 'none';
});

socket.on('raceReset', () => {
  stopAllAudio();
  raceEnded = false; positions = []; trackBodies = []; cameraY = 0; showTrack = false;
  document.getElementById('winner').style.display = 'none';
  document.getElementById('leaderHud').style.display = 'none';
  setOverlay('¡Preparados para la siguiente!');
});
</script>
</body>
</html>
