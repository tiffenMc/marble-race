<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎱 MARBLE RACE</title>
<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #060610;
    color: #f0f0ff;
    font-family: 'Nunito', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  #waitScreen {
    position: fixed; inset: 0;
    background: #060610;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .wait-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: min(10vw, 5rem);
    color: #ff6b2b;
    text-shadow: 0 0 60px #ff6b2b99;
    letter-spacing: 6px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }
  .wait-sub {
    color: #6666aa;
    font-size: 1rem;
    margin-top: 12px;
    text-align: center;
    padding: 0 20px;
  }
  .marble-orbs {
    display: flex; gap: 16px; margin-top: 30px; flex-wrap: wrap; justify-content: center;
  }
  .orb {
    width: 50px; height: 50px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: .65rem; font-weight: 900;
    text-align: center; padding: 4px;
    overflow: hidden;
    box-shadow: 0 0 20px currentColor;
    animation: float 3s ease-in-out infinite;
    animation-delay: calc(var(--i) * 0.3s);
  }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .orb img { width:100%; height:100%; object-fit:cover; border-radius:50%; }

  /* Countdown overlay */
  #countdownOverlay {
    position: fixed; inset: 0;
    background: #00000099;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 90;
  }
  .countdown-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: min(40vw, 20rem);
    color: #ffcc00;
    text-shadow: 0 0 80px #ffcc0088;
    line-height: 1;
    animation: countPop .6s ease-out forwards;
  }
  @keyframes countPop {
    0% { transform: scale(2); opacity:0; }
    60% { transform: scale(0.9); opacity:1; }
    100% { transform: scale(1); opacity:1; }
  }

  /* Race UI */
  #raceUI {
    display: none;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* Top HUD */
  #hud {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;
    background: #0a0a1488;
    border-bottom: 1px solid #ffffff11;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .hud-round {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 3px;
    color: #ffcc00;
  }
  .hud-leader {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
    background: #ffffff0a;
    border-radius: 20px;
    padding: 4px 14px;
    font-weight: 700;
    font-size: .85rem;
  }
  .leader-dot {
    width: 10px; height: 10px; border-radius: 50%;
    animation: blink 1s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* Canvas area */
  #canvasWrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  #raceCanvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* Side scoreboard */
  #scoreboard {
    position: absolute;
    top: 10px; right: 10px;
    background: #0a0a1499;
    border: 1px solid #ffffff11;
    border-radius: 12px;
    padding: 10px 14px;
    min-width: 160px;
    backdrop-filter: blur(10px);
  }
  .sb-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 2px;
    color: #ffcc00;
    margin-bottom: 8px;
    text-align: center;
  }
  .sb-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 5px;
    font-size: .8rem;
  }
  .sb-pos { font-family:'Bebas Neue',sans-serif; font-size:.95rem; color:#6666aa; width:16px; }
  .sb-avatar {
    width: 24px; height: 24px; border-radius: 50%;
    object-fit: cover; flex-shrink: 0;
  }
  .sb-name { flex:1; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .sb-pts { font-family:'Bebas Neue',sans-serif; font-size:1rem; color:#ff6b2b; }

  /* Winner overlay */
  #winnerOverlay {
    position: fixed; inset: 0;
    background: #000000cc;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 80;
  }
  .winner-trophy { font-size: 5rem; animation: bounce 1s infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }
  .winner-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: min(8vw, 3.5rem);
    color: #ffcc00;
    text-shadow: 0 0 40px #ffcc0088;
    letter-spacing: 4px;
    margin-top: 10px;
  }
  .winner-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: min(15vw, 6rem);
    color: #ff6b2b;
    text-shadow: 0 0 60px #ff6b2b88;
    letter-spacing: 2px;
  }
  .winner-avatar {
    width: 120px; height: 120px; border-radius: 50%;
    object-fit: cover;
    border: 4px solid #ffcc00;
    margin-top: 16px;
    box-shadow: 0 0 40px #ffcc0088;
  }
  .wait-next { color:#6666aa; margin-top:20px; font-size:.9rem; }

  /* Confetti canvas */
  #confettiCanvas {
    position: fixed; inset: 0; pointer-events: none; z-index: 79;
    display: none;
  }
</style>
</head>
<body>

<!-- WAIT SCREEN -->
<div id="waitScreen">
  <div class="wait-logo">🎱 MARBLE RACE</div>
  <div class="wait-sub">Esperando al host para empezar...</div>
  <div class="marble-orbs" id="orbContainer"></div>
</div>

<!-- COUNTDOWN -->
<div id="countdownOverlay">
  <div class="countdown-num" id="countNum">3</div>
</div>

<!-- RACE -->
<div id="raceUI">
  <div id="hud">
    <div class="hud-round" id="hudRound">RONDA 1</div>
    <div class="hud-leader">
      <div class="leader-dot" id="leaderDot" style="background:#ff6b2b"></div>
      <span>🥇 En cabeza: </span>
      <span id="leaderName" style="color:#ffcc00">—</span>
    </div>
  </div>
  <div id="canvasWrap">
    <canvas id="raceCanvas"></canvas>
    <div id="scoreboard">
      <div class="sb-title">🏆 Puntos</div>
      <div id="sbRows"></div>
    </div>
  </div>
</div>

<!-- WINNER -->
<div id="winnerOverlay">
  <div class="winner-trophy">🏆</div>
  <div class="winner-label">¡GANADOR!</div>
  <div class="winner-name" id="winnerName">—</div>
  <div id="winnerAvatarWrap"></div>
  <div class="wait-next">Esperando siguiente ronda...</div>
</div>

<canvas id="confettiCanvas"></canvas>

<script>
const socket = io();
const { Engine, Render, Runner, Bodies, Body, World, Events, Composite } = Matter;

let gameState = {};
let engine, runner, matterRender;
let marbleBodies = [];
let audioObjects = {};
let currentLeaderAudio = null;
let raceFinished = false;
let finishY = 0;
let animFrame;

// ─── Socket events ───────────────────────────────────────────────
socket.on('stateUpdate', (state) => {
  const prev = gameState.phase;
  gameState = state;

  updateOrbs(state.marbles);
  updateScoreboard(state);

  if (state.phase === 'lobby' || state.phase === 'setup') {
    showWait();
  } else if (state.phase === 'ready') {
    showRace();
    buildScene(state.marbles, state.seed || 1, false);
  } else if (state.phase === 'racing' && prev !== 'racing') {
    showRace();
    buildScene(state.marbles, state.seed, true);
    raceFinished = false;
  } else if (state.phase === 'results') {
    // already shown by raceWinner
  }

  document.getElementById('hudRound').textContent = `RONDA ${state.round}`;
});

socket.on('countdownTick', (n) => {
  const overlay = document.getElementById('countdownOverlay');
  const num = document.getElementById('countNum');
  overlay.style.display = 'flex';
  if (n > 0) {
    num.textContent = n;
    num.style.animation = 'none';
    void num.offsetWidth;
    num.style.animation = 'countPop .6s ease-out forwards';
    playBeep(n);
  } else {
    num.textContent = '¡YA!';
    num.style.color = '#39ff14';
    num.style.animation = 'none';
    void num.offsetWidth;
    num.style.animation = 'countPop .4s ease-out forwards';
    playBeep(0);
    setTimeout(() => { overlay.style.display = 'none'; }, 800);
  }
});

socket.on('leaderChanged', (marbleId) => {
  updateLeader(marbleId);
  playMarbleSound(marbleId);
});

socket.on('raceWinner', ({ winnerId, scores }) => {
  gameState.scores = scores;
  showWinner(winnerId);
  updateScoreboard(gameState);
  stopAllAudio();
});

// ─── UI helpers ──────────────────────────────────────────────────
function showWait() {
  document.getElementById('waitScreen').style.display = 'flex';
  document.getElementById('raceUI').style.display = 'none';
  document.getElementById('winnerOverlay').style.display = 'none';
  destroyEngine();
}

function showRace() {
  document.getElementById('waitScreen').style.display = 'none';
  document.getElementById('raceUI').style.display = 'flex';
  document.getElementById('winnerOverlay').style.display = 'none';
}

function updateOrbs(marbles) {
  if (!marbles) return;
  const c = document.getElementById('orbContainer');
  c.innerHTML = marbles.map((m, i) => `
    <div class="orb" style="background:${m.color};color:${contrastColor(m.color)};--i:${i}">
      ${m.image ? `<img src="${m.image}">` : m.name.substring(0,6)}
    </div>
  `).join('');
}

function contrastColor(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return (r*299+g*587+b*114)/1000 > 128 ? '#000' : '#fff';
}

function updateLeader(marbleId) {
  const marble = gameState.marbles?.find(m => m.id === marbleId);
  if (!marble) return;
  document.getElementById('leaderName').textContent = marble.name;
  document.getElementById('leaderDot').style.background = marble.color;
}

function updateScoreboard(state) {
  if (!state.marbles?.length) return;
  const sorted = [...state.marbles].sort((a,b) => (state.scores?.[b.id]??0)-(state.scores?.[a.id]??0));
  document.getElementById('sbRows').innerHTML = sorted.map((m,i) => `
    <div class="sb-row">
      <div class="sb-pos">${i+1}</div>
      ${m.image ? `<img src="${m.image}" class="sb-avatar" style="border:2px solid ${m.color}">` :
        `<div class="sb-avatar" style="background:${m.color}"></div>`}
      <div class="sb-name">${m.name}</div>
      <div class="sb-pts">${state.scores?.[m.id]??0}</div>
    </div>
  `).join('');
}

function showWinner(winnerId) {
  const marble = gameState.marbles?.find(m => m.id === winnerId);
  if (!marble) return;
  document.getElementById('winnerName').textContent = marble.name;
  document.getElementById('winnerName').style.color = marble.color;
  const avatarWrap = document.getElementById('winnerAvatarWrap');
  avatarWrap.innerHTML = marble.image
    ? `<img src="${marble.image}" class="winner-avatar" style="border-color:${marble.color}">`
    : `<div style="width:120px;height:120px;border-radius:50%;background:${marble.color};margin-top:16px;display:flex;align-items:center;justify-content:center;font-size:3rem">🎱</div>`;
  document.getElementById('winnerOverlay').style.display = 'flex';
  launchConfetti(marble.color);
}

// ─── Physics ──────────────────────────────────────────────────────
function destroyEngine() {
  if (runner) Runner.stop(runner);
  if (engine) { World.clear(engine.world); Engine.clear(engine); }
  if (matterRender) { Render.stop(matterRender); matterRender.canvas.width = 0; }
  if (animFrame) cancelAnimationFrame(animFrame);
  marbleBodies = [];
  engine = null; runner = null; matterRender = null;
}

function buildScene(marbles, seed, running) {
  destroyEngine();
  if (!marbles || marbles.length === 0) return;

  const wrap = document.getElementById('canvasWrap');
  const W = wrap.clientWidth, H = wrap.clientHeight;
  finishY = H - 40;

  engine = Engine.create({ gravity: { y: 1.4 } });
  const world = engine.world;

  // Canvas setup
  const canvas = document.getElementById('raceCanvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // Marble radius scales with count
  const R = Math.max(14, Math.min(28, 400 / marbles.length));

  // ── Preload marble images ──
  const marbleImgs = {};
  let loaded = 0;
  function tryStart() {
    loaded++;
    if (loaded >= marbles.length) startSim();
  }
  marbles.forEach(m => {
    if (m.image) {
      const img = new Image();
      img.onload = () => { marbleImgs[m.id] = img; tryStart(); };
      img.onerror = tryStart;
      img.src = m.image;
    } else {
      setTimeout(tryStart, 0);
    }
  });

  function startSim() {
    // ── Generate obstacles with seed ──
    const rng = seededRng(seed);
    const obstacles = [];

    // Walls
    const wallOpts = { isStatic: true, restitution: .4, friction: .1, render:{fillStyle:'#1a1a2e'} };
    obstacles.push(
      Bodies.rectangle(W/2, H + 25, W + 4, 50, wallOpts),  // floor (hidden, used as trigger)
      Bodies.rectangle(-25, H/2, 50, H, wallOpts),
      Bodies.rectangle(W+25, H/2, 50, H, wallOpts)
    );

    // Random obstacle shapes
    const numPegs = 18 + Math.floor(rng() * 14);
    const zones = 6;
    const zoneH = (H * 0.75) / zones;

    for (let z = 0; z < zones; z++) {
      const yBase = H * 0.1 + z * zoneH;
      const count = 3 + Math.floor(rng() * 4);
      for (let i = 0; i < count; i++) {
        const x = R*2 + rng() * (W - R*4);
        const y = yBase + rng() * zoneH;
        const type = Math.floor(rng() * 4);
        let body;
        const hue = Math.floor(rng() * 360);
        const col = `hsl(${hue},60%,40%)`;
        if (type === 0) {
          // Circle peg
          body = Bodies.circle(x, y, R * (0.6 + rng()*0.8), {
            isStatic: true, restitution: .6, friction: .05,
            render: { fillStyle: col }
          });
        } else if (type === 1) {
          // Rectangle ramp
          const w = W * (0.08 + rng() * 0.18);
          const angle = (rng() - .5) * Math.PI * 0.5;
          body = Bodies.rectangle(x, y, w, 10, {
            isStatic: true, restitution: .3, friction: .1, angle,
            render: { fillStyle: col }
          });
        } else if (type === 2) {
          // Triangle
          const sz = R * (1.2 + rng());
          body = Bodies.polygon(x, y, 3, sz, {
            isStatic: true, restitution: .5, friction: .05,
            angle: rng() * Math.PI,
            render: { fillStyle: col }
          });
        } else {
          // Hexagon bumper
          const sz = R * (0.5 + rng() * 0.5);
          body = Bodies.polygon(x, y, 6, sz, {
            isStatic: true, restitution: .7, friction: .02,
            render: { fillStyle: col }
          });
        }
        obstacles.push(body);
      }
    }

    // Funnel ramps at bottom to guide marbles
    const rampW = W * 0.3;
    obstacles.push(
      Bodies.rectangle(W*0.18, H*0.88, rampW, 10, { isStatic:true, restitution:.3, friction:.1, angle: -0.35, render:{fillStyle:'#334'} }),
      Bodies.rectangle(W*0.82, H*0.88, rampW, 10, { isStatic:true, restitution:.3, friction:.1, angle: 0.35, render:{fillStyle:'#334'} })
    );

    World.add(world, obstacles);

    // ── Marbles ──
    const spacing = Math.min(W / (marbles.length + 1), R * 3);
    const startX = (W - spacing * (marbles.length - 1)) / 2;
    marbleBodies = marbles.map((m, i) => {
      const x = startX + i * spacing;
      const y = R + 10;
      const body = Bodies.circle(x, y, R, {
        restitution: .5, friction: .02, frictionAir: .008,
        render: { fillStyle: m.color }
      });
      body.marbleId = m.id;
      body.marbleName = m.name;
      body.marbleColor = m.color;
      body.marbleImg = marbleImgs[m.id] || null;
      if (!running) Body.setStatic(body, true);
      return body;
    });
    World.add(world, marbleBodies);

    // ── Run physics ──
    runner = Runner.create();
    if (running) Runner.run(runner, engine);

    // ── Render loop ──
    function draw() {
      animFrame = requestAnimationFrame(draw);
      ctx.clearRect(0, 0, W, H);

      // Background gradient
      const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
      bgGrad.addColorStop(0, '#060610');
      bgGrad.addColorStop(1, '#0d0d22');
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, W, H);

      // Finish line
      ctx.save();
      ctx.strokeStyle = '#ffcc00';
      ctx.lineWidth = 3;
      ctx.setLineDash([12, 8]);
      ctx.beginPath();
      ctx.moveTo(0, finishY);
      ctx.lineTo(W, finishY);
      ctx.stroke();
      ctx.restore();
      // Finish label
      ctx.save();
      ctx.font = 'bold 13px Nunito';
      ctx.fillStyle = '#ffcc0099';
      ctx.fillText('🏁 META', 8, finishY - 6);
      ctx.restore();

      // Draw obstacles
      const bodies = Composite.allBodies(world);
      bodies.forEach(b => {
        if (marbleBodies.includes(b)) return;
        if (b.isStatic && b.bounds.max.y > H) return; // skip floor
        const verts = b.vertices;
        ctx.beginPath();
        ctx.moveTo(verts[0].x, verts[0].y);
        for (let v of verts) ctx.lineTo(v.x, v.y);
        ctx.closePath();
        ctx.fillStyle = b.render?.fillStyle || '#334';
        ctx.fill();
        ctx.strokeStyle = '#ffffff11';
        ctx.lineWidth = 1;
        ctx.stroke();
      });

      // Draw marbles
      marbleBodies.forEach(b => {
        const { x, y } = b.position;
        ctx.save();
        ctx.beginPath();
        ctx.arc(x, y, R, 0, Math.PI * 2);
        ctx.closePath();
        // Clip for image
        if (b.marbleImg) {
          ctx.save();
          ctx.beginPath();
          ctx.arc(x, y, R, 0, Math.PI * 2);
          ctx.clip();
          ctx.drawImage(b.marbleImg, x-R, y-R, R*2, R*2);
          ctx.restore();
          // Border
          ctx.beginPath();
          ctx.arc(x, y, R, 0, Math.PI * 2);
          ctx.strokeStyle = b.marbleColor;
          ctx.lineWidth = 3;
          ctx.stroke();
        } else {
          // Gradient sphere
          const grad = ctx.createRadialGradient(x - R*0.3, y - R*0.3, R*0.05, x, y, R);
          grad.addColorStop(0, lightenColor(b.marbleColor, 80));
          grad.addColorStop(0.5, b.marbleColor);
          grad.addColorStop(1, darkenColor(b.marbleColor, 60));
          ctx.fillStyle = grad;
          ctx.fill();
          ctx.strokeStyle = '#ffffff33';
          ctx.lineWidth = 1.5;
          ctx.stroke();
        }

        // Name label
        ctx.font = `bold ${Math.max(8, R * 0.55)}px Nunito`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#fff';
        ctx.shadowColor = '#000';
        ctx.shadowBlur = 4;
        if (!b.marbleImg) {
          ctx.fillText(b.marbleName.substring(0,4), x, y);
        }
        ctx.restore();

        // Name below
        ctx.save();
        ctx.font = `700 ${Math.max(9, R * 0.5)}px Nunito`;
        ctx.textAlign = 'center';
        ctx.fillStyle = b.marbleColor;
        ctx.shadowColor = '#000';
        ctx.shadowBlur = 6;
        ctx.fillText(b.marbleName, x, y + R + 12);
        ctx.restore();
      });

      // Leader detection & finish detection
      if (running && !raceFinished && marbleBodies.length > 0) {
        let leader = marbleBodies[0];
        marbleBodies.forEach(b => { if (b.position.y > leader.position.y) leader = b; });

        // Update leader
        if (leader.marbleId !== window._lastLeader) {
          window._lastLeader = leader.marbleId;
          socket.emit('leaderUpdate', leader.marbleId);
          updateLeader(leader.marbleId);
          playMarbleSound(leader.marbleId);
        }

        // Finish check
        marbleBodies.forEach(b => {
          if (b.position.y >= finishY && !raceFinished) {
            raceFinished = true;
            Runner.stop(runner);
            socket.emit('raceFinished', b.marbleId);
          }
        });
      }
    }
    draw();

    // Activate marbles when race starts
    if (!running) {
      socket.once('stateUpdate', (st) => {
        if (st.phase === 'racing') {
          marbleBodies.forEach(b => Body.setStatic(b, false));
          Runner.run(runner, engine);
        }
      });
    }
  }
}

// ─── Audio ──────────────────────────────────────────────────────
function playMarbleSound(marbleId) {
  const marble = gameState.marbles?.find(m => m.id === marbleId);
  if (!marble?.sound) {
    stopAllAudio(); return;
  }
  if (currentLeaderAudio?.marbleId === marbleId) return; // already playing
  stopAllAudio();
  if (!audioObjects[marbleId]) {
    const a = new Audio(marble.sound);
    a.loop = true; a.volume = 0.6;
    audioObjects[marbleId] = a;
  }
  audioObjects[marbleId].marbleId = marbleId;
  audioObjects[marbleId].currentTime = 0;
  audioObjects[marbleId].play().catch(()=>{});
  currentLeaderAudio = audioObjects[marbleId];
}

function stopAllAudio() {
  Object.values(audioObjects).forEach(a => { a.pause(); a.currentTime = 0; });
  currentLeaderAudio = null;
}

// ─── Countdown beep ──────────────────────────────────────────────
function playBeep(n) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = n > 0 ? 440 + (3-n)*220 : 880;
    gain.gain.setValueAtTime(0.4, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.3);
  } catch(e) {}
}

// ─── Seeded RNG ──────────────────────────────────────────────────
function seededRng(seed) {
  let s = seed;
  return function() {
    s = (s * 9301 + 49297) % 233280;
    return s / 233280;
  };
}

// ─── Color helpers ───────────────────────────────────────────────
function lightenColor(hex, amount) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.min(255, r + amount); g = Math.min(255, g + amount); b = Math.min(255, b + amount);
  return `rgb(${r},${g},${b})`;
}
function darkenColor(hex, amount) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.max(0, r - amount); g = Math.max(0, g - amount); b = Math.max(0, b - amount);
  return `rgb(${r},${g},${b})`;
}

// ─── Confetti ────────────────────────────────────────────────────
function launchConfetti(color) {
  const cv = document.getElementById('confettiCanvas');
  cv.style.display = 'block';
  cv.width = window.innerWidth; cv.height = window.innerHeight;
  const ctx = cv.getContext('2d');
  const particles = Array.from({length:120}, () => ({
    x: Math.random() * cv.width, y: -20,
    vx: (Math.random()-0.5)*6, vy: 2+Math.random()*4,
    r: 5+Math.random()*8,
    color: Math.random()<0.5 ? color : ['#ffcc00','#ff6b2b','#39ff14','#fff'][Math.floor(Math.random()*4)],
    rot: Math.random()*Math.PI*2, rotV: (Math.random()-0.5)*0.2
  }));
  let frame = 0;
  function tick() {
    ctx.clearRect(0,0,cv.width,cv.height);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.rot += p.rotV; p.vy += 0.1;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.color; ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r);
      ctx.restore();
    });
    frame++;
    if (frame < 180) requestAnimationFrame(tick);
    else { ctx.clearRect(0,0,cv.width,cv.height); cv.style.display='none'; }
  }
  tick();
}
